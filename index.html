<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

body {
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding:10px;
  background: linear-gradient(-45deg,#1cbca4,#74bf54,#53bc67);
}

/* контейнер */
.container {
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* верх */
.top-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  padding:16px;
  border-radius:20px;
}

/* дата */
.datetime {
  text-align:center;
}

.date {
  font-size:22px;
  font-weight:bold;
}

.time {
  margin-top:6px;
  font-size:22px;
}

/* дни */
.weekdays {
  display:flex;
  justify-content:center;
  gap:6px;
  margin:6px 0;
}

.day {
  padding:4px 8px;
  border-radius:6px;
}

.day.active {
  background:red;
}

/* погода */
.weather {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
}

/* вкладки */
.tabs {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tab {
  flex:1;
  text-align:center;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.tab.active {
  background:#ff2b2b;
}

/* таблица */
.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns:20% 1fr 20%;
  text-align:center;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.details {
  display:none;
  font-size:14px;
  padding-bottom:10px;
}

.details-row div:nth-child(3){
  color:#00ff9c;
}
</style>
</head>

<body>

<div class="container">

<div class="top-row">

<div class="widget">
  <div class="datetime">
    <div class="date" id="date"></div>

    <div class="weekdays">
      <div class="day">пн</div>
      <div class="day">вт</div>
      <div class="day">ср</div>
      <div class="day">чт</div>
      <div class="day">пт</div>
      <div class="day">сб</div>
      <div class="day">нд</div>
    </div>

    <div class="time" id="time"></div>
  </div>
</div>

<div class="widget">
  <div class="weather" id="weather"></div>
</div>

</div>

<div class="widget">

<div class="tabs">
  <div class="tab active" onclick="switchTab('electric',this)">Електрички</div>
  <div class="tab" onclick="switchTab('train',this)">Потяги</div>
  <div class="tab" onclick="switchTab('bus',this)">Автобуси</div>
</div>

<div id="electric" class="section active">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>
</div>

<div id="train" class="section" style="display:none;text-align:center;padding:20px;">
  Немає даних
</div>

<div id="bus" class="section" style="display:none;text-align:center;padding:20px;">
  Немає даних
</div>

</div>

</div>

<script>

/* вкладки */
function switchTab(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* время */
function updateTime(){
  const now=new Date();
  date.textContent=now.toLocaleDateString("uk-UA");
  time.textContent=now.toLocaleTimeString("uk-UA");

  const days=document.querySelectorAll(".day");
  days.forEach(d=>d.classList.remove("active"));

  let i=now.getDay();
  i=i===0?6:i-1;
  days[i].classList.add("active");
}
setInterval(updateTime,1000);
updateTime();

/* погода */
fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true")
.then(r=>r.json())
.then(d=>{
  const w=d.current_weather;
  weather.innerHTML=`
    <div>Вільногірськ</div>
    <div style="font-size:26px;font-weight:bold;">🌤 ${Math.round(w.temperature)}°C</div>
    <div>💨 ${Math.round(w.windspeed)} м/с</div>
  `;
});

/* расписание + шторки */
const trains=[
{n:"6008",r:"Дніпро",t:"07:22",d:[["Вільногірськ","05:16"],["Дніпро","07:22"]]},
{n:"6010",r:"Камʼянське",t:"08:09",d:[["Вільногірськ","06:01"],["Камʼянське","08:09"]]}
];

function render(){
  list.innerHTML="";
  trains.forEach(x=>{
    const id="d"+x.n;

    list.innerHTML+=`
    <div class="train" onclick="toggle('${id}')">
      <div>${x.n}</div>
      <div>${x.r}</div>
      <div>${x.t}</div>
    </div>

    <div class="details" id="${id}">
      ${x.d.map(s=>`<div class="details-row"><div></div><div>${s[0]}</div><div>${s[1]}</div></div>`).join("")}
    </div>
    `;
  });
}

function toggle(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block"?"none":"block";
}

render();

</script>

</body>
</html>
