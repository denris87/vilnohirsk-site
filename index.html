<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Вільногірськ Онлайн</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --highlight-color: #ffcc00; 
  --widget-bg: rgba(0, 0, 0, 0.6);
  --time-green: #00ff9c;
  --time-passed: #888;
}

html, body { margin:0; padding:0; height:100%; }
* { -webkit-user-select: none; user-select: none; box-sizing: border-box; }

body {
  color:#fff; font-family:Arial, sans-serif;
  display:flex; justify-content:center; align-items:flex-start; min-height:100vh;
  background: linear-gradient(-45deg, #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,#a5ca49,#8cc454,#41bc81,#74bf54,#53bc67);
  background-size:400% 400%; animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove { 0% {background-position:0% 50%;} 50% {background-position:100% 50%;} 100% {background-position:0% 50%;} }

.wrapper { width:100%; max-width:900px; padding:10px; }
.container { display:flex; flex-direction:column; gap:10px; }

/* ШАПКА */
.top-row { display: flex; flex-direction: row; justify-content: space-between; gap: 8px; width: 100%; }
.widget {
  background: var(--widget-bg); padding: 10px 6px; border-radius: 12px;
  flex: 1; min-height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden;
}

#date { font-size: clamp(18px, 4.8vw, 26px); font-weight: 900; }
#time { font-size: clamp(16px, 4.2vw, 22px); font-weight: 900; font-family: monospace; }
.weekdays { display:flex; justify-content:center; gap:4px; font-size: 14px; font-weight:900; margin: 6px 0; }
.day { opacity: 0.4; }
.day.active { background:red; border-radius:4px; padding: 0 5px; opacity: 1; }

.weather-box { position: relative; width: 100%; height: 85px; display: flex; align-items: center; justify-content: center; }
.weather-content { position: absolute; width: 100%; transition: opacity 1s; opacity: 0; text-align: center; pointer-events: none; }
.weather-content.active { opacity: 1; pointer-events: auto; }
.weather-city { font-weight:bold; font-size: 13px; color: #04b6cb; margin-bottom: 2px; }
.weather-wind { font-size: 11px; color: #aaa; margin-top: 2px; }

/* ТАБИ (КОРЕШКИ) */
.tabs-nav { display: flex; padding: 0 10px; gap: 5px; margin-bottom: 0; position: relative; z-index: 2; }
.tab-btn {
  padding: 10px 20px; border: none; background: rgba(0, 0, 0, 0.4); color: rgba(255, 255, 255, 0.6);
  font-weight: bold; cursor: pointer; border-radius: 12px 12px 0 0; font-size: 13px; text-transform: uppercase; transition: 0.3s;
}
.tab-btn.active { background: var(--widget-bg); color: #fff; padding-bottom: 12px; margin-bottom: -1px; }

/* КОНТЕНТ */
.main-list-widget {
  background: var(--widget-bg); padding: 15px 10px; border-radius: 0 16px 16px 16px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; z-index: 1;
}
.content-section { display: none; }
.content-section.active { display: block; }

.table-head { display: grid; grid-template-columns: 15% 1fr 20%; align-items: center; justify-items: center; font-weight: 800; border-bottom: 2px solid #aaa; padding-bottom: 8px; margin-bottom: 5px; font-size: 14px; }
.train { display: grid; grid-template-columns: 15% 1fr 20%; align-items: center; justify-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
.train-num-box { position: relative; font-weight: bold; }

.alert-dot { position: absolute; top: -4px; right: -8px; width: 7px; height: 7px; background: #ff3b3b; border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ШТОРКА (3 КОЛОНКИ) */
.details { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.4s ease; background: rgba(255,255,255,0.05); border-radius: 10px; }
.details.open { max-height: 5000px; opacity: 1; padding: 10px; }
.schedule-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (max-width: 650px) { .schedule-grid { grid-template-columns: 1fr; } }
.schedule-row { display: flex; justify-content: space-between; padding: 4px 6px; border-bottom: 1px dashed rgba(255,255,255,0.1); font-size: 11px; }
.row-highlight { background: rgba(255, 204, 0, 0.15) !important; color: var(--highlight-color) !important; border-radius: 4px; font-weight: bold; }
.st-green { color: var(--time-green); font-weight: bold; }
.st-passed { color: var(--time-passed); }

/* ЛІНІЯ ТА НАПИС ЗМІН */
.details-divider { width:60%; height:1px; background:rgba(255,255,255,0.3); margin:15px auto; }
.details-note { text-align:center; font-weight:bold; color: #ff4d4d; margin: 10px 0; text-shadow: 0 0 5px rgba(0,0,0,0.5); font-size: 13px; }

/* АВТОБУСИ */
.bus-card { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.bus-title { color: var(--highlight-color); text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 15px; }
.bus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.bus-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 7px; border-radius: 6px; margin-bottom: 3px; font-size: 12px; }
.bus-row b { color: var(--time-green); font-family: monospace; font-size: 14px; }
</style>
</head>

    <div id="buses" class="content-section">

              </div>

                <div class="bus-row"><span>з Дніпра</span><b>07:00</b></div>

                <div class="bus-row"><span>з Дніпра</span><b>13:00</b></div>

    </div>

</div>
</div>

<script>
function openTab(t,b){
  document.querySelectorAll('.content-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById(t).classList.add('active'); b.classList.add('active');
}

function getKyivNow(){ return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"})); }

function updateDT(){
  const n = getKyivNow();
  document.getElementById("date").textContent = n.toLocaleDateString('uk-UA');
  document.getElementById("time").textContent = n.toLocaleTimeString('uk-UA');
  const d = document.querySelectorAll(".day"); d.forEach(x=>x.classList.remove("active"));
  let i = n.getDay(); i = (i === 0) ? 6 : i - 1; d[i].classList.add("active");
}

function getWeatherEmoji(code){
  if(code === 0) return "☀️";
  if(code <= 3) return "⛅";
  if(code <= 48) return "🌫️";
  if(code <= 67) return "🌧️";
  if(code <= 77) return "🌨️";
  if(code <= 99) return "⛈️";
  return "🌡️";
}

async function loadW(){
  const c = [{n:'Вільногірськ',lat:48.48,lon:34.02}, {n:'Дніпро',lat:48.45,lon:34.98}];
  let res = [];
  for(let city of c){
    try {
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true&timezone=Europe%2FKyiv`);
      const d = await r.json(); res.push({name: city.n, w: d.current_weather});
    } catch(e){}
  }
  const container = document.getElementById("weather-container");
  container.innerHTML = res.map((item, idx) => `
    <div class="weather-content ${idx === 0 ? 'active' : ''}" id="ws-${idx}">
      <div class="weather-city">${item.name}</div>
      <div style="font-size:24px; font-weight:bold">${getWeatherEmoji(item.w.weathercode)} ${Math.round(item.w.temperature)}°C</div>
      <div class="weather-wind">💨 ${Math.round(item.w.windspeed)} м/с</div>
    </div>
  `).join("");
  let cur = 0; setInterval(() => {
    const slides = document.querySelectorAll('.weather-content'); if(slides.length < 2) return;
    slides[cur].classList.remove('active'); cur = (cur + 1) % slides.length; slides[cur].classList.add('active');
  }, 7000);
}

const order = ["6008","6010","6005","6018","6015","6038","6035","6037","6044","6043"];

function isPast(tStr){
  if(!tStr || tStr.includes("-")) return false;
  const now = getKyivNow();
  const [h, m] = tStr.split(':').map(Number);
  const t = new Date(now); t.setHours(h, m, 0, 0);
  return t < now;
}

function renderGrid(data, isChanges = false){
  let i = 1; const size = Math.ceil(data.length / 3);
  let h = '<div class="schedule-grid">';
  for(let c=0; c<3; c++){
    h += '<div class="col" style="background:rgba(255,255,255,0.05); border-radius:8px; padding:5px;">';
    data.slice(c*size, (c+1)*size).forEach(r => {
      const past = isPast(r[1]);
      const isVil = r[0].includes('Вільногірськ');
      h += `<div class="schedule-row ${isVil?'row-highlight':''}">
        <span>${r[0]}</span><span class="${past && !isChanges?'st-passed':'st-green'}">${r[1]}</span>
      </div>`;
    });
    h += '</div>';
  }
  return h + '</div>';
}

function renderTrains(el, data){
  data.sort((a,b)=>order.indexOf(a.number)-order.indexOf(b.number));
  let html = `<div class="table-head"><div>№</div><div>Напрямок</div><div>Відпр.</div></div>`;
  data.forEach(x=>{
    const id="d-"+x.number;
    const now = getKyivNow();
    const [h, m] = x.time.split(':').map(Number);
    const tT = new Date(now); tT.setHours(h, m, 0, 0);
    const diff = Math.floor((tT - now) / 60000);
    let cls = diff < 0 ? "passed" : (diff <= 10 ? "soon" : "future");

    html += `<div class="train" onclick="document.getElementById('${id}').classList.toggle('open')">
      <div class="train-num-box">${x.number}${changes[x.number]?'<span class="alert-dot"></span>':''}</div>
      <div class="route-text">${x.route}</div>
      <div class="time-val ${cls}">${diff>=0 && diff<=10 ? '≈ '+diff+' хв' : x.time}</div>
    </div>
    <div class="details" id="${id}">
      ${renderGrid(fullSchedules[x.number] || [])}
      <div class="details-divider"></div>
      <div class="details-note">${changes[x.number] || "змін немає..."}</div>
      ${x.number === "6035" ? renderGrid(changesSchedule6035, true) : ""}
    </div>`;
  });
  el.innerHTML = html;
}

async function loadData(){
  try {
    const r = await fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains");
    const d = await r.json(); renderTrains(document.getElementById("list"), d.trains);
  } catch(e){ document.getElementById("list").innerHTML = "API Offline"; }
}

updateDT(); loadW(); loadData();
setInterval(updateDT, 1000); setInterval(loadData, 30000);
