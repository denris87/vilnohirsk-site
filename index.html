<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

/* блоки */
.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:#0b0b0b;
  padding:14px;
  border-radius:14px;
}

/* дата */
.datetime {
  text-align:center;
  color:#00ff9c;
  font-family:"Courier New";
}

.date {
  font-size: clamp(28px, 6vw, 60px);
  font-weight:bold;
}

.time {
  font-size: clamp(18px, 4vw, 36px);
}

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
}

.table-head {
  font-size: clamp(13px, 3vw, 22px);
  font-weight:700; /* жирнее */
  color:#ffffff;
  border-bottom:2px solid #444;
  padding-bottom:8px;
  letter-spacing:0.5px;
  text-shadow:0 0 6px rgba(255,255,255,0.2); /* лёгкое свечение */
}

.table-head div {
  text-align:center;
}

.train {
  padding:8px 0;
  border-bottom:1px solid #222;
  font-size: clamp(14px, 3.5vw, 26px);
}

/* колонки */
.train div:nth-child(1),
.time-cell {
  text-align:center;
}

.route {
  text-align:center;
  word-break:break-word;
}

/* цвета поездов */
.future div { color:#00ff9c !important; }
.soon div { color:#ffcc00 !important; }
.passed div { color:#555 !important; }

/* ПРИМЕТКИ */
.notes-title {
  text-align:left;
  margin-top:10px;
  font-size: clamp(14px, 3vw, 22px);
  color:#ff3b3b;
  font-weight:bold;
}

.notes-text {
  margin-top:6px;
  color:#00ff9c;
  font-style:italic;
  font-size: clamp(13px, 2.8vw, 20px);
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<!-- ДАТА -->
<div class="widget">
  <div class="datetime">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
  </div>
</div>

<!-- РАСПИСАНИЕ -->
<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>

  <!-- ПРИМЕТКИ -->
  <div class="notes-title">Примітки:</div>
  <div class="notes-text">
    Наразі жодних змін у розкладі та скасувань приміських електропоїздів немає...
  </div>
</div>

</div>
</div>

<script>
// время Киев
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

// дата + часы
function updateDateTime() {
  const now = getKyivNow();

  const d = String(now.getDate()).padStart(2,"0");
  const m = String(now.getMonth()+1).padStart(2,"0");
  const y = now.getFullYear();

  const h = String(now.getHours()).padStart(2,"0");
  const min = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  document.getElementById("date").textContent = `${d}.${m}.${y}`;
  document.getElementById("time").textContent = `${h}:${min}:${s}`;
}

// разница
function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

// порядок
const order = [
  "6008","6010","6005","6018","6015",
  "6038","6035","6037","6044","6043"
];

// рендер
function render(el,data){
  data.sort((a,b)=> order.indexOf(a.number) - order.indexOf(b.number));

  el.innerHTML="";

  data.forEach(x=>{
    const diff = getDiff(x.time);

    let cls="train";
    let label=x.time;

    if(diff < 0){
      cls+=" passed";
    } else if(diff <= 10){
      cls+=" soon";
      label="≈ "+diff+" хв";
    } else {
      cls+=" future";
    }

    el.innerHTML+=`
      <div class="${cls}">
        <div>№${x.number}</div>
        <div class="route">${x.route}</div>
        <div class="time-cell">${label}</div>
      </div>`;
  });
}

// загрузка
function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>{
      render(document.getElementById("list"), d.trains);
    });
}

// запуск
loadTrains();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
