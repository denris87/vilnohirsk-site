<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  user-select: none;
}

body {
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,
    #a5ca49,#8cc454,#41bc81,#74bf54,#53bc67
  );
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  padding:14px;
  border-radius:16px;
  position:relative;
}

/* дата */
.datetime {
  text-align:left;
  font-family:"Courier New";
}

.date, .time {
  font-size: clamp(14px, 2.5vw, 22px);
}

.date {
  font-weight:900;
}

/* верхний блок */
.top-right {
  position:absolute;
  top:10px;
  right:14px;
  display:flex;
  gap:16px;
  align-items:flex-start;
}

/* погода */
.weather {
  text-align:right;
  font-size:14px;
}

.weather-temp {
  font-weight:bold;
}

/* топливо */
.fuel {
  font-size:11px;
  min-width:60px;
}

.fuel-row {
  display:flex;
  justify-content:space-between;
}

.fuel-name {
  color:#bbb;
}

.fuel-price {
  font-weight:bold;
}

/* инфо */
.info-header {
  text-align:center;
  color:#ff3b3b;
  font-weight:bold;
  cursor:pointer;
}

.info-content {
  display:none;
  margin-top:8px;
}

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  text-align:center;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.future .time-cell { color:#00ff9c; }
.soon .time-cell { color:#ffcc00; }
.passed .time-cell { color:#888; }

.notes-title {
  margin-top:10px;
  color:#ff3b3b;
  font-weight:bold;
}

.notes-text {
  font-style:italic;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="widget">

  <div class="top-right">
    <div class="weather" id="weather">...</div>

    <div class="fuel" id="fuel">
      <div class="fuel-row"><span class="fuel-name">А92</span><span class="fuel-price">--</span></div>
      <div class="fuel-row"><span class="fuel-name">А95</span><span class="fuel-price">--</span></div>
      <div class="fuel-row"><span class="fuel-name">ДТ</span><span class="fuel-price">--</span></div>
      <div class="fuel-row"><span class="fuel-name">Газ</span><span class="fuel-price">--</span></div>
    </div>
  </div>

  <div class="datetime">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
  </div>
</div>

<div class="widget">
  <div class="info-header" onclick="toggleInfo()">інформація</div>
  <div class="info-content" id="infoBox"></div>
</div>

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>

  <div class="notes-title">Примітки:</div>
  <div class="notes-text">
    Наразі жодних змін у розкладі немає...
  </div>
</div>

</div>
</div>

<script>
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();
  date.textContent = `${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  time.textContent = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
}

/* погода */
function loadWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true&timezone=Europe%2FKyiv")
  .then(r=>r.json())
  .then(d=>{
    const w=d.current_weather;
    document.getElementById("weather").innerHTML =
      `🌤 Вільногірськ<br><b>${Math.round(w.temperature)}°C</b><br>💨 ${Math.round(w.windspeed)} м/с`;
  });
}

/* топливо */
function loadFuel(){
  const prices = [52.9,55.4,54.8,28.9];
  const rows = document.querySelectorAll("#fuel .fuel-price");
  prices.forEach((p,i)=>rows[i].textContent=p.toFixed(2));
}

loadWeather();
loadFuel();
updateDateTime();

setInterval(updateDateTime,1000);
setInterval(loadWeather,600000);
</script>

</body>
</html>
