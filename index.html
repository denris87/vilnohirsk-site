<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  user-select: none;
}

body {
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,
    #a5ca49,#8cc454,#41bc81,#74bf54,#53bc67
  );
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  padding:14px;
  border-radius:16px;
  min-height:120px;
}

/* дни недели */
.weekdays {
  margin:6px 0;
  display:flex;
  justify-content:center;
  gap:6px;
  font-weight:bold;
}

.day {
  padding:3px 6px;
  border-radius:6px;
}

.day.active {
  background:red;
}

/* погода */
.weather {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
}

.weather-temp {
  font-weight:bold;
  font-size:24px;
}

/* ВКЛАДКИ */
.tabs {
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.tab {
  flex:1;
  text-align:center;
  padding:6px;
  border-radius:6px;
  background:#ffe066;
  color:#ff2b2b;
  font-weight:bold;
  cursor:pointer;
}

.tab.active {
  background:#ff2b2b;
  color:#fff;
}

/* секции */
.section {
  display:none;
}

.section.active {
  display:block;
}

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns:20% 1fr 20%;
  text-align:center;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="top-row">

<div class="widget">
  <div id="date"></div>

  <div class="weekdays">
    <div class="day">пн</div>
    <div class="day">вт</div>
    <div class="day">ср</div>
    <div class="day">чт</div>
    <div class="day">пт</div>
    <div class="day">сб</div>
    <div class="day">нд</div>
  </div>

  <div id="time"></div>
</div>

<div class="widget">
  <div class="weather" id="weather"></div>
</div>

</div>

<div class="widget">

<!-- ВКЛАДКИ -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('electric',this)">Електрички</div>
  <div class="tab" onclick="switchTab('trains',this)">Потяги</div>
  <div class="tab" onclick="switchTab('bus',this)">Автобуси</div>
</div>

<!-- ЭЛЕКТРИЧКИ -->
<div id="electric" class="section active">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>
</div>

<!-- ПОТЯГИ -->
<div id="trains" class="section">
  <div style="text-align:center;padding:20px;">Немає даних</div>
</div>

<!-- АВТОБУСЫ -->
<div id="bus" class="section">
  <div style="text-align:center;padding:20px;">Немає даних</div>
</div>

</div>

</div>
</div>

<script>
function switchTab(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* время */
function updateTime(){
  const now=new Date();
  date.textContent=now.toLocaleDateString("uk-UA");
  time.textContent=now.toLocaleTimeString("uk-UA");
}
setInterval(updateTime,1000);
updateTime();

/* погода */
fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true")
.then(r=>r.json())
.then(d=>{
  const w=d.current_weather;
  weather.innerHTML=`
    <div>Вільногірськ</div>
    <div class="weather-temp">🌤 ${Math.round(w.temperature)}°C</div>
    <div>💨 ${Math.round(w.windspeed)} м/с</div>
  `;
});

/* пример поездов */
list.innerHTML = `
<div class="train"><div>6008</div><div>Дніпро</div><div>07:22</div></div>
<div class="train"><div>6010</div><div>Камʼянське</div><div>08:09</div></div>
`;
</script>

</body>
</html>
