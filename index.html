<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:#0b0b0b;
  padding:14px;
  border-radius:14px;
}

/* дата */
.datetime {
  text-align:center;
  color:#00ff9c;
  font-family:"Courier New";
}

.date { font-size:40px; }
.time { font-size:24px; }

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns: 20% 1fr 25%;
  align-items:center;
}

.table-head {
  color:#777;
  border-bottom:1px solid #333;
}

.table-head div { text-align:center; }

.train {
  padding:10px 0;
  border-bottom:1px solid #222;
  font-size:18px;
}

.route {
  text-align:center;
}

.time-cell {
  text-align:center;
}

/* кнопка i */
.info-btn {
  margin-left:6px;
  background:#00ff9c;
  color:#000;
  border-radius:50%;
  width:18px;
  height:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  cursor:pointer;
}

/* цвета */
.future div { color:#00ff9c; }
.soon div { color:#ffcc00; }
.passed div { color:#555; }

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.modal-content {
  background:#111;
  padding:20px;
  border-radius:10px;
  max-height:90%;
  overflow:auto;
}

.close {
  color:#fff;
  float:right;
  cursor:pointer;
  font-size:20px;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<!-- дата -->
<div class="widget">
  <div class="datetime">
    <div id="date"></div>
    <div id="time"></div>
  </div>
</div>

<!-- список -->
<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>
</div>

</div>
</div>

<!-- МОДАЛ -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalText"></div>
  </div>
</div>

<script>
// время
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();

  document.getElementById("date").textContent =
    now.toLocaleDateString("uk-UA");

  document.getElementById("time").textContent =
    now.toLocaleTimeString("uk-UA");
}

// разница
function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

// порядок
const order = [
  "6008","6010","6005","6018","6015",
  "6038","6035","6037","6044","6043"
];

// 📄 ДАННЫЕ ДЛЯ МОДАЛА (пример для 6008)
const details = {
  "6008": `
    <b>№6008</b><br><br>
    П'ятихатки-Пас. → Дніпро-Гол.<br><br>
    Вільногірськ — 05:15 / 05:16<br>
    Верхівцеве — 05:35 / 05:36<br>
    Кам'янське — 06:40 / 06:42<br>
    Дніпро — 07:32
  `
};

// модал
function openModal(num){
  document.getElementById("modalText").innerHTML =
    details[num] || "Немає даних";
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

// рендер
function render(el,data){
  data.sort((a,b)=> order.indexOf(a.number) - order.indexOf(b.number));

  el.innerHTML="";

  data.forEach(x=>{
    const diff = getDiff(x.time);

    let cls="train";
    let label=x.time;

    if(diff < 0){
      cls+=" passed";
    } else if(diff <= 10){
      cls+=" soon";
      label="≈ "+diff+" хв";
    } else {
      cls+=" future";
    }

    const infoBtn = x.number === "6008"
      ? `<span class="info-btn" onclick="openModal('6008')">i</span>`
      : "";

    el.innerHTML+=`
      <div class="${cls}">
        <div>№${x.number} ${infoBtn}</div>
        <div class="route">${x.route}</div>
        <div class="time-cell">${label}</div>
      </div>`;
  });
}

// загрузка
function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>{
      render(document.getElementById("list"), d.trains);
    });
}

// запуск
loadTrains();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
