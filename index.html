<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Smart Вільногірськ</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
:root {
  --highlight-color: #ffcc00; 
  --glass-bg: rgba(0, 0, 0, 0.45);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
  --time-green: #00ff9c;
}

html, body { margin: 0; padding: 0; min-height: 100vh; background: #1e3c72; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  display: flex;
  justify-content: center;
  background: linear-gradient(-45deg, #1e3c72, #2a5298, #009ffd, #2af598);
  background-size: 300% 300%;
  animation: gradientMove 20s ease infinite alternate;
}
@keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

.wrapper { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
.liquid-glass { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--glass-shadow); }

/* ІНФО ТАБЛО */
.alert-widget { padding: 15px; text-align: center; cursor: pointer; }
.alert-drawer { max-height: 0; overflow: hidden; transition: 0.4s ease; font-size: 14px; opacity: 0; }
.alert-drawer.open { max-height: 200px; opacity: 1; padding-top: 10px; }

/* ВІДЖЕТИ ВЕРХУ */
.top-row { display: flex; gap: 10px; }
.datetime-widget, .weather-widget { flex: 1; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 110px; }
#date { font-size: 18px; font-weight: 800; }
#time { font-size: 22px; font-weight: 700; color: var(--time-green); }
.day-labels { display: flex; justify-content: center; gap: 4px; font-size: 10px; margin-top: 5px; opacity: 0.5; }
.day-labels .active { color: #ff4d4d; font-weight: 900; opacity: 1; }

/* ТАБИ (ГРУПИ) */
.tab-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
.tabs-nav { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.tabs-nav::-webkit-scrollbar { display: none; }
.tab-btn { flex: 0 0 auto; padding: 10px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.3s; }
.tab-btn.active { background: #fff; color: #000; border-color: #fff; }

/* КОНТЕЙНЕРИ СПИСКІВ (ВИПАДАЮЧІ) */
.list-drawer { 
  display: none; 
  width: 100%; 
  padding: 15px; 
  background: rgba(11, 29, 58, 0.9); 
  border-radius: 20px; 
  border: 1px solid rgba(255,255,255,0.1); 
  animation: slideIn 0.3s ease-out;
}
.list-drawer.active { display: block; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ТРАНСПОРТ */
.train-item { display: grid; grid-template-columns: 50px 1fr 60px; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; }
.train-no { font-weight: 800; color: var(--highlight-color); }
.train-route { font-size: 13px; font-weight: 600; text-align: center; }
.train-time { font-weight: 800; text-align: right; }

/* BLA BLA CAR */
.blabla-btns { display: flex; gap: 10px; margin-bottom: 15px; }
.bb-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
.bb-driver { background: #00ff9c; color: #000; }
.bb-pass { background: #ffcc00; color: #000; }
.bb-sub { font-size: 9px; opacity: 0.7; }
.ride-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
.ride-row { display: flex; justify-content: space-between; font-size: 13px; margin-top: 8px; padding: 6px; background: rgba(0,0,0,0.2); border-radius: 8px; }
.ride-tel { display: block; text-align: right; color: #00ff9c; font-weight: 800; text-decoration: none; margin-top: 10px; }

/* МОДАЛКА */
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
.modal.active { display: flex; justify-content: center; align-items: flex-start; }
.modal-content { background: #0b1d3a; width: 100%; max-width: 400px; border-radius: 24px; padding: 25px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
.modal-close { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; }
.f-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-family: inherit; }
.f-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; background: #00ff9c; }

/* МАРКЕТ */
.market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.market-tile { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; text-align: center; }
.market-img { width: 100%; aspect-ratio: 1; border-radius: 10px; background: #000; object-fit: cover; margin-bottom: 8px; }
</style>
</head>

<body>

<div class="wrapper">
  
  <div class="alert-widget liquid-glass" onclick="document.getElementById('alert-box').classList.toggle('open')">
    <b style="letter-spacing: 1px;">ІНФОРМАЦІЙНЕ ТАБЛО</b>
    <div id="alert-box" class="alert-drawer">Актуальних новин зараз немає.</div>
  </div>

  <div class="tab-group">
    <div class="tabs-nav">
      <button class="tab-btn" onclick="toggleSection('trains', this)">🚆 Електрички</button>
      <button class="tab-btn" onclick="toggleSection('buses', this)">🚌 Автобуси</button>
      <button class="tab-btn" onclick="toggleSection('blabla', this)">🚗 BlaBlaCar</button>
    </div>

    <div id="section-trains" class="list-drawer">
      <div id="trains-list">Завантаження розкладу...</div>
    </div>

    <div id="section-buses" class="list-drawer">
      <div id="buses-list">Завантаження автобусів...</div>
    </div>

    <div id="section-blabla" class="list-drawer">
      <div class="blabla-btns">
        <button class="bb-btn bb-driver" onclick="openBB('driver')">🚗 ВОДІЙ <span class="bb-sub">Додати авто</span></button>
        <button class="bb-btn bb-pass" onclick="openBB('passenger')">🧍 ПАСАЖИР <span class="bb-sub">Шукаю місце</span></button>
      </div>
      <div id="blabla-data">Оновлення списку...</div>
    </div>
  </div>

  <div class="top-row">
    <div class="datetime-widget liquid-glass">
      <div id="date">--.--.----</div>
      <div class="day-labels">
        <span>пн</span><span>вт</span><span>ср</span><span>чт</span><span>пт</span><span>сб</span><span>нд</span>
      </div>
      <div id="time">00:00:00</div>
    </div>
    <div class="weather-widget liquid-glass" id="weather-box">
      Завантаження...
    </div>
  </div>

  <div class="tab-group">
    <div class="tabs-nav">
      <button class="tab-btn" onclick="toggleSection('shops', this)">🛍️ Магазини</button>
      <button class="tab-btn" onclick="toggleSection('flea', this)">📦 Барахолка</button>
    </div>

    <div id="section-shops" class="list-drawer">
      <div class="market-grid" id="shops-list"></div>
    </div>

    <div id="section-flea" class="list-drawer">
      <div class="market-grid" id="flea-list"></div>
    </div>
  </div>

</div>

<div class="modal" id="bb-modal" onclick="this.classList.remove('active')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-close" onclick="document.getElementById('bb-modal').classList.remove('active')">&times;</div>
    <h3 id="modal-title" style="text-align:center;">Поїздка</h3>
    <form onsubmit="sendRide(event)">
      <div style="display:flex; gap:10px;">
        <input type="text" id="f-from" class="f-input" placeholder="Звідки" required>
        <input type="text" id="f-to" class="f-input" placeholder="Куди" required>
      </div>
      <input type="date" id="f-date" class="f-input" required>
      <input type="time" id="f-time" class="f-input" required>
      <div style="display:flex; gap:10px;">
        <input type="number" id="f-seats" class="f-input" placeholder="Місць" required>
        <input type="number" id="f-price" class="f-input" placeholder="Ціна грн">
      </div>
      <input type="tel" id="f-phone" class="f-input" placeholder="Телефон" required>
      <textarea id="f-comment" class="f-input" placeholder="Коментар..."></textarea>
      <input type="hidden" id="f-type">
      <button type="submit" class="f-btn" id="f-submit">Опублікувати</button>
    </form>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const API_URL = 'https://vilnohirsk-blablacar-api-production.up.railway.app/api/rides';

// --- ЛОГІКА ТАБІВ ---
function toggleSection(id, btn) {
  const isAlreadyActive = btn.classList.contains('active');
  const parent = btn.closest('.tab-group');
  
  // Закриваємо всі в цій групі
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  parent.querySelectorAll('.list-drawer').forEach(d => d.classList.remove('active'));

  if (!isAlreadyActive) {
    btn.classList.add('active');
    document.getElementById('section-' + id).classList.add('active');
    if (id === 'blabla') loadBlaBla();
  }
}

// --- ЧАС ---
function updateTime() {
  const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Kyiv"}));
  document.getElementById('date').innerText = now.toLocaleDateString('uk-UA');
  document.getElementById('time').innerText = now.toLocaleTimeString('uk-UA');
  const days = document.querySelectorAll('.day-labels span');
  days.forEach(d => d.classList.remove('active'));
  let dIdx = now.getDay();
  days[dIdx === 0 ? 6 : dIdx - 1].classList.add('active');
}
setInterval(updateTime, 1000); updateTime();

// --- ПОГОДА ---
async function loadWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true');
    const d = await res.json();
    document.getElementById('weather-box').innerHTML = `
      <div style="font-size:11px; opacity:0.6;">ВІЛЬНОГІРСЬК</div>
      <div style="font-size:28px; font-weight:800;">${Math.round(d.current_weather.temperature)}°C</div>
      <div style="font-size:11px; opacity:0.6;">💨 ${d.current_weather.windspeed} м/с</div>
    `;
  } catch(e) {}
}
loadWeather();

// --- ТРАНСПОРТ ---
async function loadTrains() {
  try {
    const res = await fetch('https://vilnohirsk-trains-production.up.railway.app/api/trains');
    const d = await res.json();
    document.getElementById('trains-list').innerHTML = d.trains.map(t => `
      <div class="train-item">
        <div class="train-no">${t.number}</div>
        <div class="train-route">${t.route}</div>
        <div class="train-time">${t.time}</div>
      </div>
    `).join('');
  } catch(e) { document.getElementById('trains-list').innerText = "Помилка завантаження"; }
}
loadTrains();

// --- BLA BLA CAR ---
function openBB(type) {
  document.getElementById('f-type').value = type;
  document.getElementById('modal-title').innerText = type === 'driver' ? '🚘 Дати авто' : '🧍 Шукаю місце';
  document.getElementById('bb-modal').classList.add('active');
}

async function sendRide(e) {
  e.preventDefault();
  const btn = document.getElementById('f-submit');
  btn.disabled = true; btn.innerText = "Відправка...";

  const data = {
    type: document.getElementById('f-type').value,
    from: document.getElementById('f-from').value,
    to: document.getElementById('f-to').value,
    date: document.getElementById('f-date').value,
    time: document.getElementById('f-time').value,
    seats: document.getElementById('f-seats').value,
    price: document.getElementById('f-price').value || 0,
    phone: document.getElementById('f-phone').value,
    comment: document.getElementById('f-comment').value
  };

  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    alert("✅ Опубліковано!");
    document.getElementById('bb-modal').classList.remove('active');
    loadBlaBla();
  } catch(e) { alert("❌ Помилка"); }
  finally { btn.disabled = false; btn.innerText = "Опублікувати"; }
}

async function loadBlaBla() {
  const box = document.getElementById('blabla-data');
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if(data.length === 0) { box.innerHTML = "<center opacity='0.5'>Поїздок немає</center>"; return; }
    box.innerHTML = data.map(r => `
      <div class="ride-card">
        <div class="ride-route"><b>${r.from}</b> → <b>${r.to}</b></div>
        <div style="font-size:12px; color:var(--highlight-color); margin-top:4px;">🗓 ${r.date} | 🕒 ${r.time}</div>
        <div class="ride-row">
          <span>💺 ${r.seats} місць</span>
          <span>💰 ${r.price} грн</span>
        </div>
        ${r.comment ? `<div style="font-size:11px; margin-top:8px; opacity:0.7;">💬 ${r.comment}</div>` : ''}
        <a href="tel:${r.phone}" class="ride-tel">📞 ${r.phone}</a>
      </div>
    `).join('');
  } catch(e) { box.innerText = "Сервер не відповідає"; }
}
</script>

</body>
</html>
