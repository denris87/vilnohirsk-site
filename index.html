<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Smart Вільногірськ</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --highlight-color: #ffcc00; 
  --glass-bg: rgba(0, 0, 0, 0.45);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-light: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
  
  --time-green: #00ff9c;
  --time-passed: rgba(255, 255, 255, 0.4);
}

html, body { 
  margin: 0; 
  padding: 0; 
  min-height: 100vh; 
}

* { 
  -webkit-user-select: none; 
  user-select: none; 
  box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent; 
}

body {
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  background: linear-gradient(-45deg, #1e3c72, #2a5298, #009ffd, #2af598, #009ffd);
  background-size: 300% 300%;
  animation: gradientMove 30s ease-in-out infinite alternate;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.wrapper { width: 100%; max-width: 900px; padding: 15px; padding-bottom: 40px; }
.container { display: flex; flex-direction: column; gap: 15px; }
.liquid-glass { background: var(--glass-bg); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-border-light); border-left: 1px solid var(--glass-border-light); box-shadow: var(--glass-shadow); border-radius: 28px; }

/* ТАБЛО */
.alert-main-widget { padding: 0; border-radius: 28px; position: relative; z-index: 100; }
.alert-header { padding: 16px; text-align: center; cursor: pointer; background: rgba(255, 255, 255, 0.05); transition: background 0.3s; border-radius: 28px; }
.alert-title-box { position: relative; display: inline-block; font-weight: 800; font-size: 16px; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; }

.alert-drawer { position: absolute; top: calc(100% + 10px); left: 0; width: 100%; max-height: 0; overflow: hidden; opacity: 0; transition: all 0.5s ease; background: linear-gradient(135deg, #0b1d3a, #061124); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; z-index: 150; }
.alert-drawer.open { max-height: 1000px; opacity: 1; padding: 15px; }

/* РОЗКЛАДИ */
.main-list-widget { position: absolute; top: calc(100% + 10px); left: 0; width: 100%; max-height: 0; overflow: hidden; opacity: 0; visibility: hidden; transition: all 0.5s ease; background: linear-gradient(135deg, #0b1d3a, #061124); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; z-index: 120; }
.main-list-widget.open { max-height: 3000px; opacity: 1; visibility: visible; padding: 20px 10px; }

/* ШОПІНГ ШТОРКА (ПЛАВНА) */
.shopping-drawer { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); background: linear-gradient(135deg, #0b1d3a, #061124); border-radius: 24px; border: 1px solid transparent; }
.shopping-drawer.open { max-height: 10000px; opacity: 1; padding: 20px 15px; margin-top: 15px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); }

/* ДИЗАЙН КАРТОЧЕК ШОПИНГА */
.shops-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
@media (min-width: 650px) { .shops-grid { grid-template-columns: 1fr 1fr; } }

.shop-ad-card { display: flex; flex-direction: column; background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.2)); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
.shop-ad-photo { width: 100%; height: 200px; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; }
.shop-ad-photo img { width: 100%; height: 100%; object-fit: cover; }
.shop-ad-info { padding: 15px; text-align: left; }
.shop-ad-title { font-weight: 800; font-size: 18px; color: #fff; margin-bottom: 4px; }
.shop-details-list { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; background: rgba(0,0,0,0.15); padding: 12px; border-radius: 12px; }
.phone-list { display: flex; flex-direction: column; gap: 4px; }
.shop-phone-link { color: #2af598; text-decoration: none; font-weight: 800; }
.shop-map-link { color: #74b9ff; text-decoration: none; font-weight: 700; background: rgba(116, 185, 255, 0.1); padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(116, 185, 255, 0.2); display: inline-block; margin-top: 5px; }

/* ОСТАЛЬНЫЕ СТИЛИ */
.top-row { display: flex; gap: 12px; }
.widget { flex: 1; padding: 15px; text-align: center; }
.tab-btn { flex: 1; padding: 12px 5px; border: none; background: transparent; color: rgba(255, 255, 255, 0.55); font-weight: 700; cursor: pointer; border-radius: 14px; font-size: 13px; }
.tab-btn.active { background: rgba(255, 255, 255, 0.15); color: #fff; }
.day.active { background-color: #ff4d4d; color: #fff; border-radius: 6px; padding: 2px 5px; }
.row-highlight { color: var(--highlight-color); font-weight: 800; }
.schedule-row { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
.train-num-box { font-weight: 800; background: rgba(255,255,255,0.1); padding: 4px 6px; border-radius: 8px; font-size: 11px; }
.time-val { font-weight: 800; }
.time-val.soon { color: var(--highlight-color); }
.time-val.future { color: var(--time-green); }
.time-val.passed { color: var(--time-passed); }
.banner-alert-dot { width: 8px; height: 8px; background: #ff3b3b; border-radius: 50%; display: none; }
.banner-alert-dot.active { display: inline-block; }
</style>
</head>

<body>
<div class="wrapper">
<div class="container">

  <div class="alert-main-widget liquid-glass">
    <div class="alert-header" onclick="document.getElementById('alert-drawer').classList.toggle('open')">
      <div class="alert-title-box">ІНФОРМАЦІЙНЕ ТАБЛО <span class="banner-alert-dot" id="main-alert-dot"></span></div>
    </div>
    <div class="alert-drawer" id="alert-drawer">
      <div id="alert-drawer-content">Завантаження...</div>
    </div>
  </div>

  <div class="schedule-group">
    <div class="tabs-nav liquid-glass">
      <button class="tab-btn" onclick="openTab('trains', this)">Електрички</button>
      <button class="tab-btn" onclick="openTab('long-trains', this)">Потяги</button>
      <button class="tab-btn" onclick="openTab('buses', this)">Автобуси</button>
    </div>
    <div id="main-list-widget" class="main-list-widget">
      <div id="trains" class="content-section active"><div id="list"></div></div>
      <div id="long-trains" class="content-section"><div id="long-trains-list"></div></div>
      <div id="buses" class="content-section"><div id="buses-list"></div></div>
    </div>
  </div>

  <div class="top-row">
    <div class="widget liquid-glass">
      <div id="date" style="font-size:22px; font-weight:800;"></div>
      <div class="weekdays"><div class="day">пн</div><div class="day">вт</div><div class="day">ср</div><div class="day">чт</div><div class="day">пт</div><div class="day">сб</div><div class="day">нд</div></div>
      <div id="time" style="font-size:18px; font-weight:700;"></div>
    </div>
    <div class="widget liquid-glass">
      <div id="weather-container" style="height:95px; display:flex; align-items:center; justify-content:center;">Завантаження...</div>
    </div>
  </div>

  <div class="shopping-main-widget liquid-glass">
    <div class="alert-header" onclick="document.getElementById('shopping-drawer').classList.toggle('open')">
      <div class="alert-title-box">🛍 Шопінг Вільногірська</div>
    </div>
    <div class="shopping-drawer" id="shopping-drawer">
      <div id="shopping-list-content">Завантаження...</div>
    </div>
  </div>

</div>
</div>

<script>
// ЛОГИКА ТАБОВ
function openTab(tabId, btn) {
  const widget = document.getElementById('main-list-widget');
  if (btn.classList.contains('active') && widget.classList.contains('open')) {
    widget.classList.remove('open');
    return;
  }
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
  btn.classList.add('active');
  document.getElementById(tabId).style.display = 'block';
  widget.classList.add('open');
}

function getKyivNow(){ return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"})); }

// РЕНДЕР СЕТКИ ЗУПИНОК
function renderGrid(data) {
  if (!data || data.length === 0) return "";
  let html = '<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">';
  const perCol = Math.ceil(data.length / 3);
  for(let c = 0; c < 3; c++) {
    html += '<div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:12px;">';
    for(let j = 0; j < perCol; j++) {
      const idx = c * perCol + j;
      if (data[idx]) {
        const isVil = data[idx][0].toLowerCase().includes('вільногірськ');
        html += `<div class="schedule-row ${isVil?'row-highlight':''}"><span>${data[idx][0]}</span><b>${data[idx][1]}</b></div>`;
      }
    }
    html += '</div>';
  }
  return html + '</div>';
}

// РЕНДЕР ТРАНСПОРТА
function renderTrains(el, data){
  if (!data) return;
  el.innerHTML = data.map(x => {
    const id = "d-" + x.number; const now = getKyivNow();
    let status = "future";
    if (x.time && x.time.includes(':')) {
      const [h, m] = x.time.split(':').map(Number);
      const tTime = new Date(now); tTime.setHours(h, m, 0, 0);
      const diff = Math.floor((tTime - now) / 60000);
      if (diff < 0) status = "passed"; else if (diff <= 10) status = "soon";
    }
    return `<div class="train" onclick="document.getElementById('${id}').classList.toggle('open')">
      <div class="train-num-box">${x.number}</div><div class="route-text">${x.route}</div><div class="time-val ${status}">${x.time}</div>
    </div><div class="details" id="${id}">${renderGrid(x.fullSchedule)}</div>`;
  }).join('');
}

// РЕНДЕР ШОПИНГА
function renderShops(shopsData) {
  const container = document.getElementById('shopping-list-content');
  if (!shopsData || shopsData.length === 0) { container.innerHTML = "Оголошень немає"; return; }
  
  let html = '<div class="shops-grid">';
  shopsData.forEach(shop => {
    const photo = shop.photo ? `<img src="${shop.photo}">` : `<span style="opacity:0.2;">ФОТО</span>`;
    const instagram = shop.instagram ? `<a href="${shop.instagram}" target="_blank" style="text-decoration:none; color:inherit;">${shop.name} 🔗</a>` : shop.name;
    
    let phonesHtml = 'Не вказано';
    if (shop.phone) {
      phonesHtml = `<div class="phone-list">` + String(shop.phone).split(',').map(p => {
        const clean = p.trim().replace(/[^0-9+]/g, '');
        return `<a href="tel:${clean}" class="shop-phone-link">${p.trim()}</a>`;
      }).join('') + `</div>`;
    }

    html += `<div class="shop-ad-card">
      <div class="shop-ad-photo">${photo}</div>
      <div class="shop-ad-info">
        <div style="font-size:10px; color:var(--highlight-color); font-weight:800; text-transform:uppercase;">${shop.category || 'Магазин'}</div>
        <div class="shop-ad-title">${instagram}</div>
        <div class="shop-details-list">
          <div class="shop-detail-item">🕒 <div><b>Графік:</b>${shop.schedule.replace(/\n/g, '<br>')}</div></div>
          <div class="shop-detail-item">💳 <div>Оплата: <b>${shop.contactless ? '✅' : '❌'}</b></div></div>
          <div class="shop-detail-item">📶 <div>WI-FI: <b>${shop.wifi ? '✅' : '❌'}</b></div></div>
          <div class="shop-detail-item">📞 <div><b>Телефон:</b>${phonesHtml}</div></div>
          <div class="shop-detail-item">📍 <div><b>Адреса:</b>${shop.address || 'Не вказано'}<br>
          ${shop.map_link ? `<a href="${shop.map_link}" target="_blank" class="shop-map-link">🗺️ Відкрити на мапі</a>` : ''}</div></div>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html + '</div>';
}

// FETCH ДАННЫХ
async function loadAll() {
  try {
    // Поезда
    fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains").then(r=>r.json()).then(d=>renderTrains(document.getElementById("list"),d.trains));
    fetch("https://grateful-enthusiasm-production-c1cc.up.railway.app/schedule").then(r=>r.json()).then(d=> {
      document.getElementById("long-trains-list").innerHTML = d.trains.map((x, i) => `<div class="train" onclick="document.getElementById('lt-${i}').classList.toggle('open')"><div class="train-num-box">${x.number}</div><div class="route-text">${x.route}</div><div class="time-val future">${x.time}</div></div><div class="details" id="lt-${i}">${renderGrid(x.stops.map(s => [s.station, s.time]))}</div>`).join('');
    });
    // Автобусы
    fetch("https://vilnohirskbuses-production.up.railway.app/api/buses").then(r=>r.json()).then(d=> {
      document.getElementById("buses-list").innerHTML = d.buses.map((b, i) => {
        const cols = b.directions.map(dir => `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; margin-bottom:5px;"><b style="color:var(--highlight-color); font-size:11px;">${dir.title}</b>` + dir.rows.map(r => `<div class="schedule-row"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('') + `</div>`).join('');
        return `<div class="train" onclick="document.getElementById('bus-${i}').classList.toggle('open')"><div class="train-num-box">🚌</div><div class="route-text">${b.route}</div><div class="time-val future">Розклад</div></div><div class="details" id="bus-${i}">${cols}</div>`;
      }).join('');
    });
    // Шопинг
    fetch("https://vilnohirsk-shops-production.up.railway.app/api/shops").then(r=>r.json()).then(d=>renderShops(d.shops));
    // Новинки
    fetch("https://vilnohirsk-alerts-production.up.railway.app/api/alert").then(r=>r.json()).then(d=> {
      const all = [...(d.communal||[]), ...(d.news||[])].filter(a => a.show);
      const dot = document.getElementById("main-alert-dot");
      if(all.length) {
        dot.classList.add("active");
        document.getElementById("alert-drawer-content").innerHTML = all.map(a => `<div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:10px; margin-bottom:5px;"><b>${a.title}</b><br>${a.text}</div>`).join('');
      } else { dot.classList.remove("active"); document.getElementById("alert-drawer-content").innerHTML = "Новин немає"; }
    });
  } catch(e) {}
}

function updateDateTime(){
  const now = getKyivNow();
  document.getElementById("date").textContent=`${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  document.getElementById("time").textContent=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
  const days=document.querySelectorAll(".day"); days.forEach(d=>d.classList.remove("active"));
  let i=now.getDay(); i=i===0?6:i-1; days[i].classList.add("active");
}

async function loadWeather(){
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true&timezone=Europe%2FKyiv`);
    const d = await r.json();
    document.getElementById("weather-container").innerHTML = `<div style="text-align:center;"><div style="opacity:0.6; font-size:12px;">Вільногірськ</div><div style="font-size:28px; font-weight:800;">${Math.round(d.current_weather.temperature)}°C</div></div>`;
  } catch(e) {}
}

updateDateTime(); loadWeather(); loadAll();
setInterval(updateDateTime, 1000);
</script>
</body>
</html>
