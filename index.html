<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:#0b0b0b;
  padding:14px;
  border-radius:14px;
}

/* дата */
.datetime {
  text-align:center;
  color:#00ff9c;
  font-family:"Courier New";
}

.date {
  font-size: clamp(28px, 6vw, 60px);
  font-weight:bold;
}

.time {
  font-size: clamp(18px, 4vw, 36px);
}

/* таблица */
.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
}

.table-head {
  font-size: clamp(13px, 3vw, 22px);
  font-weight:700;
  color:#ffffff;
  border-bottom:2px solid #444;
  padding-bottom:8px;
}

.table-head div {
  text-align:center;
}

.train div:nth-child(1),
.details-row div:nth-child(1) {
  text-align:center;
}

.route {
  text-align:center;
  word-break:break-word;
}

.time-cell {
  text-align:center;
}

.train {
  padding:8px 0;
  border-bottom:1px solid #222;
  font-size: clamp(14px, 3.5vw, 26px);
  cursor:pointer;
}

/* шторка */
.details {
  display:none;
  padding:10px 0;
  border-bottom:1px solid #222;
  font-size: clamp(13px, 3vw, 22px);
}

.details-row div:nth-child(2),
.details-row div:nth-child(3) {
  text-align:center;
}

.details-row div:nth-child(3) {
  color:#00ff9c;
}

/* цвета */
.future div { color:#00ff9c !important; }
.soon div { color:#ffcc00 !important; }
.passed div { color:#555 !important; }

/* примітки */
.notes-title {
  margin-top:10px;
  color:#ff3b3b;
  font-weight:bold;
}

.notes-text {
  color:#00ff9c;
  font-style:italic;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="widget">
  <div class="datetime">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
  </div>
</div>

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут прямування</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>

  <div class="notes-title">Примітки:</div>
  <div class="notes-text">
    Наразі жодних змін у розкладі та скасувань приміських електропоїздів немає...
  </div>
</div>

</div>
</div>

<script>
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();

  document.getElementById("date").textContent =
    `${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;

  document.getElementById("time").textContent =
    `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}

function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

const order = [
  "6008","6010","6005","6018","6015",
  "6038","6035","6037","6044","6043"
];

function render(el,data){
  data.sort((a,b)=> order.indexOf(a.number) - order.indexOf(b.number));

  el.innerHTML="";

  data.forEach(x=>{
    const diff = getDiff(x.time);

    let cls="train";
    let label=x.time;

    if(diff < 0){
      cls+=" passed";
    } else if(diff <= 10){
      cls+=" soon";
      label="≈ "+diff+" хв";
    } else {
      cls+=" future";
    }

    const id = "details-"+x.number;

    el.innerHTML+=`
      <div class="${cls}" onclick="toggle('${id}')">
        <div>${x.number}</div>
        <div class="route">${x.route}</div>
        <div class="time-cell">${label}</div>
      </div>
    `;

    if(x.number === "6008"){
      el.innerHTML+=`
      <div class="details" id="${id}">
        <div class="details-row"><div></div><div>Пʼятихатки-Пас.</div><div>04:43</div></div>
        <div class="details-row"><div></div><div>Вільногірськ</div><div>05:16</div></div>
        <div class="details-row"><div></div><div>Верхівцеве</div><div>05:35</div></div>
        <div class="details-row"><div></div><div>Верхньодніпровськ</div><div>06:15</div></div>
        <div class="details-row"><div></div><div>Камʼянське-Пас.</div><div>06:42</div></div>
        <div class="details-row"><div></div><div>Дніпро-Гол. (прибуття)</div><div>07:22</div></div>
      </div>`;
    }

    if(x.number === "6010"){
      el.innerHTML+=`
      <div class="details" id="${id}">
        <div class="details-row"><div></div><div>Пʼятихатки-Пас.</div><div>05:30</div></div>
        <div class="details-row"><div></div><div>Вільногірськ</div><div>06:01</div></div>
        <div class="details-row"><div></div><div>Верхівцеве</div><div>06:19</div></div>
        <div class="details-row"><div></div><div>Верхньодніпровськ</div><div>06:38</div></div>
        <div class="details-row"><div></div><div>Камʼянське-Пас.</div><div>07:17</div></div>
        <div class="details-row"><div></div><div>Дніпро-Гол. (прибуття)</div><div>08:09</div></div>
      </div>`;
    }

    if(x.number === "6005"){
      el.innerHTML+=`
      <div class="details" id="${id}">
        <div class="details-row"><div></div><div>Дніпро-Гол.</div><div>04:52</div></div>
        <div class="details-row"><div></div><div>Камʼянське-Пас.</div><div>05:48</div></div>
        <div class="details-row"><div></div><div>Верхньодніпровськ</div><div>06:14</div></div>
        <div class="details-row"><div></div><div>Верхівцеве</div><div>06:33</div></div>
        <div class="details-row"><div></div><div>Вільногірськ</div><div>06:54</div></div>
        <div class="details-row"><div></div><div>Пʼятихатки-Пас. (прибуття)</div><div>07:28</div></div>
      </div>`;
    }

    if(x.number === "6018"){
      el.innerHTML+=`
      <div class="details" id="${id}">
        <div class="details-row"><div></div><div>Пʼятихатки-Пас.</div><div>08:29</div></div>
        <div class="details-row"><div></div><div>Вільногірськ</div><div>09:00</div></div>
        <div class="details-row"><div></div><div>Верхівцеве</div><div>09:21</div></div>
        <div class="details-row"><div></div><div>Верхньодніпровськ</div><div>09:40</div></div>
        <div class="details-row"><div></div><div>Камʼянське-Пас.</div><div>10:04</div></div>
        <div class="details-row"><div></div><div>Дніпро-Гол. (прибуття)</div><div>10:57</div></div>
      </div>`;
    }

    if(x.number === "6015"){
      el.innerHTML+=`
      <div class="details" id="${id}">
        <div class="details-row"><div></div><div>Дніпро-Гол.</div><div>08:22</div></div>
        <div class="details-row"><div></div><div>Камʼянське-Пас.</div><div>09:20</div></div>
        <div class="details-row"><div></div><div>Верхньодніпровськ</div><div>09:46</div></div>
        <div class="details-row"><div></div><div>Верхівцеве</div><div>10:35</div></div>
        <div class="details-row"><div></div><div>Вільногірськ</div><div>10:56</div></div>
        <div class="details-row"><div></div><div>Пʼятихатки-Пас. (прибуття)</div><div>11:30</div></div>
      </div>`;
    }
  });
}

function toggle(id){
  const el = document.getElementById(id);
  el.style.display = (el.style.display === "block") ? "none" : "block";
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>{
      render(document.getElementById("list"), d.trains);
    });
}

loadTrains();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
