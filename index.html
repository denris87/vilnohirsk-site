<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розклад поїздів</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
}

body {
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93
  );
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.widget {
  background:rgba(0,0,0,0.6);
  padding:14px;
  border-radius:16px;
}

.table-head,
.train {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
  justify-items:center;
}

.table-head {
  font-weight:700;
  border-bottom:2px solid #aaa;
  padding-bottom:8px;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

/* шторки */
.details {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:all 0.4s ease;
}

.details.open {
  max-height:3000px;
  opacity:1;
  padding:10px 0;
}

.details-divider {
  width:60%;
  height:1px;
  background:#fff;
  margin:10px auto;
}

.details-note {
  text-align:center;
  font-weight:bold;
}

/* адаптив */
.schedule-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

@media (max-width:600px){
  .schedule-grid { grid-template-columns:1fr; }
}

@media (min-width:601px) and (max-width:900px){
  .schedule-grid { grid-template-columns:repeat(2,1fr); }
}

.schedule-column {
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  padding:8px;
}

.schedule-row {
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:6px 0;
  border-bottom:1px dashed #aaa;
  font-size:14px;
}

.schedule-row span:first-child {
  flex:1;
  white-space:normal;
}

.schedule-row span:last-child {
  min-width:55px;
  text-align:right;
  font-weight:bold;
}

.station-number {
  margin-right:6px;
  color:#ffcc00;
  font-weight:bold;
}

.schedule-row:last-child {
  border-bottom:none;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>
</div>

</div>

<script>

/* 6005 */
const fullSchedule6005 = [...]; // оставь как у тебя (не меняю)

/* 6008 */
const fullSchedule6008 = [...]; // твой полный

/* 6010 */
const fullSchedule6010 = [...]; // твой полный

/* 6018 */
const fullSchedule6018 = [...]; // твой полный

/* 🔥 6015 */
const fullSchedule6015 = [
["Дніпро-Гол.","08:22"],["Горяїнове","08:28"],["з.п. 184 км","08:33"],["Діївка","08:39"],
["з.п. 178 км","08:44"],["з.п. 175 км","08:48"],["Сухачівка","08:55"],
["з.п. 169 км","08:59"],["з.п. 165 км","09:04"],["з.п. 164 км","09:07"],
["з.п. 160 км","09:11"],["Запоріжжя-Кам’янське","09:15"],["Кам'янське-Пас.","09:20"],
["з.п. 149 км","09:25"],["Воскобійня","09:33"],["з.п. 139 км","09:38"],
["Верхньодніпровськ","09:46"],["з.п. 128 км","09:51"],["з.п. 125 км","09:54"],
["з.п. 119 км","10:00"],["Верхівцеве","10:35"],["з.п. 114 км","10:42"],
["з.п. Гранове","10:46"],["з.п. 104 км","10:51"],["Вільногірськ","10:56"],
["Ерастівка","11:06"],["з.п. 88 км","11:13"],["з.п. Касинівка","11:19"],
["з.п. 77 км","11:25"],["П'ятихатки-Пас.","11:30"]
];

/* генератор */
function renderGrid(data){
  let i=1;
  const cols=[];
  for(let j=0;j<data.length;j+=10){
    cols.push(data.slice(j,j+10));
  }

  return `
    <div class="schedule-grid">
      ${cols.map(col=>`
        <div class="schedule-column">
          ${col.map(r=>`
            <div class="schedule-row">
              <span><span class="station-number">${i++}.</span>${r[0]}</span>
              <span>${r[1]}</span>
            </div>
          `).join("")}
        </div>
      `).join("")}
    </div>
  `;
}

function render(el,data){
  el.innerHTML="";
  data.forEach(x=>{
    const id="d-"+x.number;

    el.innerHTML+=`
      <div class="train" onclick="toggle('${id}')">
        <div>${x.number}</div>
        <div>${x.route}</div>
        <div>${x.time}</div>
      </div>

      <div class="details" id="${id}">
        ${x.number==="6005" ? renderGrid(fullSchedule6005) : ""}
        ${x.number==="6008" ? renderGrid(fullSchedule6008) : ""}
        ${x.number==="6010" ? renderGrid(fullSchedule6010) : ""}
        ${x.number==="6018" ? renderGrid(fullSchedule6018) : ""}
        ${x.number==="6015" ? renderGrid(fullSchedule6015) : ""}
        <div class="details-divider"></div>
        <div class="details-note">змін немає...</div>
      </div>
    `;
  });
}

function toggle(id){
  document.getElementById(id).classList.toggle("open");
}

fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
.then(r=>r.json())
.then(d=>render(list,d.trains));

</script>

</body>
</html>
