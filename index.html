<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* контейнер вертикально */
.container {
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.widget {
  background:#0b0b0b;
  padding:12px;
  border-radius:14px;
}

/* верх */
.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header {
  color:#00ff9c;
  font-weight:bold;
}

/* часы */
.clock {
  font-size:22px;
  font-weight:bold;
  color:#00ff9c;
  font-family:"Courier New";
}

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns: 80px 1fr 80px;
  align-items:center;
}

.table-head {
  font-size:11px;
  color:#777;
  border-bottom:1px solid #333;
  padding-bottom:4px;
}

.train {
  padding:6px 0;
  border-bottom:1px solid #333;
}

/* выравнивание */
.route {
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.time {
  text-align:right;
  font-weight:bold;
}

/* цвета */
.next { color:#00ff9c; }
.soon { color:#ffcc00; }
.passed { color:#555; }

/* погода */
.weather {
  text-align:center;
  font-size:20px;
  color:#00ff9c;
}
</style>
</head>

<body>

<div class="container">

<!-- 🌦 ПОГОДА -->
<div class="widget">
  <div class="weather" id="weather">Завантаження...</div>
</div>

<!-- 🚆 П'ятихатки → Дніпро -->
<div class="widget">
  <div class="top-bar">
    <div class="header">🚆 П'ятихатки-Пас. → Дніпро-Гол.</div>
    <div class="clock" id="clock1"></div>
  </div>

  <div class="table-head">
    <div>№</div><div>Маршрут</div><div>Відпр.</div>
  </div>

  <div id="list1"></div>
</div>

<!-- 🚆 Дніпро → П'ятихатки -->
<div class="widget">
  <div class="top-bar">
    <div class="header">🚆 Дніпро-Гол. → П'ятихатки-Пас.</div>
    <div class="clock" id="clock2"></div>
  </div>

  <div class="table-head">
    <div>№</div><div>Маршрут</div><div>Відпр.</div>
  </div>

  <div id="list2"></div>
</div>

</div>

<script>
// ⏰ Киевское время
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

// часы
function updateClocks() {
  const n=getKyivNow();
  const t=n.getHours().toString().padStart(2,"0")+":"+
           n.getMinutes().toString().padStart(2,"0");

  document.getElementById("clock1").textContent=t;
  document.getElementById("clock2").textContent=t;
}

// разница времени
function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

// рендер
function render(el,data){
  const arr=data.map(x=>({...x,diff:getDiff(x.time)}));
  const next=arr.find(x=>x.diff>=0);

  el.innerHTML="";

  arr.forEach(x=>{
    let cls="time";
    let label=x.time;

    if(x.diff<0) cls+=" passed";

    if(x.diff>=0 && x.diff<=10){
      cls+=" soon";
      label="≈ "+x.diff+" хв";
    }

    if(next && x.number===next.number) cls+=" next";

    el.innerHTML+=`
      <div class="train">
        <div>№${x.number}</div>
        <div class="route">${x.route}</div>
        <div class="${cls}">${label}</div>
      </div>`;
  });
}

// 🚆 загрузка электричек
function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>{
      const dnipro=d.trains.filter(t=>t.direction.includes("Дніпро"));
      const pyat=d.trains.filter(t=>t.direction.includes("П'ятихатки"));

      render(document.getElementById("list1"),dnipro);
      render(document.getElementById("list2"),pyat);
    });
}

// 🌦 погода
function loadWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.484&longitude=34.016&current_weather=true")
    .then(r=>r.json())
    .then(d=>{
      const w=d.current_weather;

      document.getElementById("weather").innerHTML=
        "🌦 Вільногірськ<br>"+
        "🌡 "+w.temperature+"°C<br>"+
        "💨 "+w.windspeed+" км/год";
    });
}

// запуск
loadTrains();
loadWeather();
updateClocks();

setInterval(loadTrains,30000);
setInterval(loadWeather,600000);
setInterval(updateClocks,1000);
</script>

</body>
</html>
