<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  user-select: none;
}

body {
  color:#fff;
  font-family:Arial;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  min-height:100vh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,
    #a5ca49,#8cc454,#41bc81,#74bf54,#53bc67
  );
  background-size:400% 400%;
  background-attachment: fixed;
  animation: gradientMove 60s ease infinite;
}

@supports (-webkit-touch-callout: none) {
  body {
    min-height: -webkit-fill-available;
  }
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
  padding-bottom: calc(20px + var(--safe-bottom));
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  padding:14px;
  border-radius:16px;
}

/* дата */
.datetime {
  text-align:center;
  font-family:"Courier New";
}

.date {
  font-size: clamp(28px, 6vw, 60px);
  font-weight:bold;
}

.time {
  font-size: clamp(18px, 4vw, 36px);
}

/* табло */
.info-header {
  text-align:center;
  color:#ff3b3b;
  font-weight:bold;
  font-size: clamp(14px,3vw,20px);
  cursor:pointer;
}

.info-count {
  font-size: 12px;
  margin-left:6px;
  position:relative;
  top:-6px;
}

.info-content {
  display:none;
  margin-top:8px;
  font-size: clamp(12px,2.8vw,18px);
  line-height:1.3;
  color:#ffffff;
}

/* таблица */
.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
  justify-items:center;
}

.table-head {
  font-size: clamp(13px, 3vw, 22px);
  font-weight:700;
  border-bottom:2px solid #aaa;
  padding-bottom:8px;
}

.route, .time-cell {
  text-align:center;
  width:100%;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  font-size: clamp(14px, 3.5vw, 26px);
  cursor:pointer;
}

/* БЛОК ВРЕМЕНИ */
.time-wrapper {
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ТЕКСТ НАД ВРЕМЕНЕМ */
.time-note {
  font-size:16px;
  color:#ccc;
  margin-bottom:2px;
}

/* время */
.time-cell {}

.details {
  display:none;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  font-size: clamp(13px, 3vw, 22px);
}

.details-row div:nth-child(3) {
  color:#00ff9c;
}

.future .time-cell { color:#00ff9c; font-weight:bold; }
.soon .time-cell { color:#ffcc00; font-weight:bold; }
.passed .time-cell { color:#888; }

.train div:not(.time-cell) {
  color:#ffffff;
}

.notes-title {
  margin-top:10px;
  color:#ff3b3b;
  font-weight:bold;
}

.notes-text {
  font-style:italic;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="widget">
  <div class="datetime">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
  </div>
</div>

<div class="widget">
  <div class="info-header" onclick="toggleInfo()">
    інформація<span class="info-count" id="infoCount"></span>
  </div>
  <div class="info-content" id="infoBox"></div>
</div>

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>

  <div class="notes-title">Примітки:</div>
  <div class="notes-text">
    Наразі жодних змін у розкладі та скасувань приміських електропоїздів немає...
  </div>
</div>

</div>
</div>

<script>
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.expand();
}

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

document.addEventListener("keydown", e => {
  if (e.ctrlKey && ["c","u","x","s"].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

function toggleInfo(){
  const el=document.getElementById("infoBox");
  el.style.display = el.style.display==="block"?"none":"block";
}

function updateInfoCount(){
  const count = document.querySelectorAll(".notice").length;
  document.getElementById("infoCount").textContent = count > 0 ? count : "";
}

function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();
  date.textContent = `${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  time.textContent = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}

function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

const order=["6008","6010","6005","6018","6015","6038","6035","6037","6044","6043"];

function render(el,data){
  data.sort((a,b)=>order.indexOf(a.number)-order.indexOf(b.number));
  el.innerHTML="";

  data.forEach((x,index)=>{
    const diff=getDiff(x.time);
    let cls="train";
    let label=x.time;

    if(diff<0) cls+=" passed";
    else if(diff<=10){cls+=" soon";label="≈ "+diff+" хв";}
    else cls+=" future";

    const isLast = index === data.length - 1;

    el.innerHTML+=`
      <div class="${cls}">
        <div>${x.number}</div>
        <div class="route">${x.route}</div>
        <div class="time-wrapper">
          ${isLast ? `<div class="time-note">час відправлення зі ст. Вільногірськ</div>` : ``}
          <div class="time-cell">${label}</div>
        </div>
      </div>
    `;
  });
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
  .then(r=>r.json())
  .then(d=>render(list,d.trains));
}

loadTrains();
updateDateTime();
updateInfoCount();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
