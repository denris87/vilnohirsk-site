<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Вільногірськ Онлайн</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --highlight-color: #ffcc00; 
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  user-select: none;
  box-sizing: border-box;
}

body {
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  background: linear-gradient(-45deg, #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,#a5ca49,#8cc454,#41bc81,#74bf54,#53bc67);
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top-row {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  gap: 8px;
  width: 100%;
}

.widget {
  background: rgba(0,0,0,0.6);
  padding: 10px 6px;
  border-radius: 12px;
  flex: 1;
  min-width: 0;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.datetime { text-align:center; font-family:"Courier New", monospace; width: 100%; }
#date { font-size: clamp(18px, 4.8vw, 26px); font-weight: 900; white-space: nowrap; }
#time { font-size: clamp(16px, 4.2vw, 22px); font-weight: 900; white-space: nowrap; color: #fff; }

.weekdays {
  display:flex;
  justify-content:center;
  gap:4px;
  font-size: clamp(16px, 4vw, 20px);
  font-weight:900;
  margin: 6px 0;
}
.day.active { background:red; border-radius:4px; padding: 0 5px; }

/* 🔥 ВДОСКОНАЛЕНА ПЛАВНА ПОГОДА */
.weather-box { 
  position: relative; 
  width: 100%; 
  height: 85px; 
  display: flex;
  align-items: center;
  justify-content: center;
}
.weather-content {
  position: absolute;
  width: 100%;
  /* Збільшено час переходу для приємного затемнення всього блоку */
  transition: opacity 1s ease-in-out; 
  opacity: 0;
  text-align: center;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.weather-content.active { 
  opacity: 1; 
  pointer-events: auto;
}
.weather-city { font-weight:bold; font-size: 13px; color: #04b6cb; margin-bottom: 2px; }
.weather-temp { font-size: clamp(20px, 5.5vw, 26px); font-weight:bold; white-space: nowrap; }
.weather-wind { font-size: 11px; color: #aaa; margin-top: 2px; }

.train-list-widget {
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:16px;
}

.table-head {
  display: grid;
  grid-template-columns: 15% 1fr 20%;
  align-items: center;
  justify-items: center;
  font-weight: 800; 
  border-bottom: 2px solid #aaa;
  padding-bottom: 8px;
  margin-bottom: 5px;
  font-size: 14px;
  text-transform: uppercase;
}

.train {
  display: grid;
  grid-template-columns: 15% 1fr 20%;
  align-items: center;
  justify-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
}

.route-text {
  font-weight: 600;
  text-align: center;
  font-size: clamp(12px, 3.5vw, 16px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  padding: 0 5px;
}

.time-val { font-weight: bold; font-size: clamp(14px, 3.8vw, 18px); }
.time-val.soon { color: #ffcc00; }
.time-val.future { color: #00ff9c; }
.time-val.passed { color: #888; }

.details {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 0.4s ease;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

.details.open {
  max-height: 5000px;
  opacity: 1;
  padding: 10px;
}

.details-note {
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
  color: #ff4d4d;
  text-shadow: 0 0 5px rgba(0,0,0,0.5);
  font-size: 13px;
}

.schedule-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (max-width: 600px) { .schedule-grid { grid-template-columns: 1fr; } }

.schedule-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 6px;
  border-bottom: 1px dashed rgba(255,255,255,0.2);
  font-size: 12px;
}

.row-highlight {
  background: rgba(255, 204, 0, 0.15) !important;
  border: 1px solid var(--highlight-color) !important;
  border-radius: 4px;
  color: var(--highlight-color) !important;
  font-weight: bold;
}
.row-highlight span { color: var(--highlight-color) !important; }

.station-number { color: #ffcc00; font-weight: bold; margin-right: 4px; }
.time-green { color: #00ff9c; font-weight: bold; }
.time-passed { color: #888; }
.time-normal { color: #fff; font-weight: normal; }

.alert-dot {
  position: absolute;
  top: -4px; right: -8px;
  width: 7px; height: 7px;
  background: #ff3b3b;
  border-radius: 50%;
  animation: blink 1s infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="top-row">
  <div class="widget">
    <div class="datetime">
      <div id="date"></div>
      <div class="weekdays">
        <div class="day">пн</div><div class="day">вт</div><div class="day">ср</div>
        <div class="day">чт</div><div class="day">пт</div><div class="day">сб</div>
        <div class="day">нд</div>
      </div>
      <div id="time"></div>
    </div>
  </div>

  <div class="widget">
    <div class="weather-box" id="weather-container"></div>
  </div>
</div>

<div class="train-list-widget">
  <div id="list"></div>
</div>

</div>
</div>

<script>
// Дані розкладу (залишаємо ваші повні об'єкти)
const changes = {
    "6010": "06-09.04.26 електропоїзд курсує до ст. Горяїнове",
    "6015": "06-09.04.26 електропоїзд відправляється зі ст. Горяїнове о 08:28",
    "6018": "06-09.04.26 електропоїзд курсує до ст. Горяїнове",
    "6037": "06-09.04.26 електропоїзд відправляється зі ст. Горяїнове о 17:40",
    "6035": "06-09.04.26 електропоїзд відправляється зі ст. Горяїнове і далі за цим розкладом"
};
const order=["6008","6010","6005","6018","6015","6038","6035","6037","6044","6043"];

// Тут повинні бути ваші повні масиви розкладів fullSchedules та changesSchedule6035
const fullSchedules = { /* ...ваші повні дані... */ };
const changesSchedule6035 = [ /* ...ваші повні дані... */ ];

function getKyivNow(){ return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"})); }

function isPast(time){
  if(time === "---" || time === "—") return false;
  const now = getKyivNow();
  const [h, m] = time.split(":").map(Number);
  const t = new Date(now); t.setHours(h, m, 0, 0);
  return t < now;
}

function getWeatherEmoji(code){
  if(code === 0) return "☀️";
  if(code <= 2) return "⛅";
  if(code <= 3) return "☁️";
  if(code <= 48) return "🌫️";
  if(code <= 67) return "🌧️";
  if(code <= 77) return "🌨️";
  if(code <= 99) return "⛈️";
  return "🌡️";
}

// 🔥 ЛОГІКА ПЛАВНОГО ЗАТЕМНЕННЯ ТА ПОЯВИ
async function loadWeather(){
  const coords = [
    {id: 'vil', name: 'Вільногірськ', lat: 48.48, lon: 34.02}, 
    {id: 'dni', name: 'Дніпро', lat: 48.45, lon: 34.98}
  ];
  let results = [];
  
  for(let c of coords){
    try {
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true&timezone=Europe%2FKyiv`);
      const d = await r.json();
      results.push({name: c.name, w: d.current_weather});
    } catch(e) { console.log("Weather error"); }
  }

  const container = document.getElementById("weather-container");
  if(results.length === 0) return;

  container.innerHTML = results.map((item, index) => `
    <div class="weather-content ${index === 0 ? 'active' : ''}" id="slide-${index}">
      <div class="weather-city">${item.name}</div>
      <div class="weather-temp">${getWeatherEmoji(item.w.weathercode)} ${Math.round(item.w.temperature)}°C</div>
      <div class="weather-wind">💨 ${Math.round(item.w.windspeed)} м/с</div>
    </div>
  `).join("");

  let currentIndex = 0;
  
  setInterval(() => {
    const currentSlide = document.getElementById(`slide-${currentIndex}`);
    
    // 1. Починаємо затемнення всього блоку (opacity 1 -> 0)
    if(currentSlide) currentSlide.classList.remove('active');
    
    // 2. Чекаємо 1.2 секунди (поки блок повністю зникне), потім міняємо місто
    setTimeout(() => {
      currentIndex = (currentIndex + 1) % results.length;
      const nextSlide = document.getElementById(`slide-${currentIndex}`);
      
      // 3. Вмикаємо появу нового блоку (opacity 0 -> 1)
      if(nextSlide) nextSlide.classList.add('active');
    }, 1200); 

  }, 7000); 
}

function updateDateTime(){
  const now=getKyivNow();
  document.getElementById("date").textContent=`${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  document.getElementById("time").textContent=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
  const days=document.querySelectorAll(".day");
  days.forEach(d=>d.classList.remove("active"));
  let i=now.getDay(); i=i===0?6:i-1;
  days[i].classList.add("active");
}

function renderGrid(data, isChanges = false){
  let i = 1; const cols = [];
  for(let j=0; j<data.length; j+=10){ cols.push(data.slice(j, j+10)); }
  return `
    <div class="schedule-grid">
      ${cols.map(col=>`
        <div class="schedule-column" style="background:rgba(255,255,255,0.1); border-radius:8px; padding:5px;">
          ${col.map(r=>{
            const passed = isPast(r[1]);
            const isVil = r[0].includes("Вільногірськ");
            const rowClass = isVil ? 'schedule-row row-highlight' : 'schedule-row';
            const timeClass = isChanges || isVil ? 'time-normal' : (passed ? 'time-passed' : 'time-green');
            return `<div class="${rowClass}">
              <span class="station-name"><span class="station-number">${i++}.</span>${r[0]}</span>
              <span class="${timeClass}">${r[1]}</span>
            </div>`;
          }).join("")}
        </div>
      `).join("")}
    </div>
  `;
}

function render(el, data){
  if(!data) return;
  data.sort((a,b)=>order.indexOf(a.number)-order.indexOf(b.number));
  el.innerHTML=`<div class="table-head"><div>№</div><div>Маршрут прямування</div><div>Відпр.</div></div><div id="trains-content"></div>`;
  const container = document.getElementById('trains-content');
  data.forEach(x=>{
    const now = getKyivNow();
    const [h, m] = x.time.split(':').map(Number);
    const trainTime = new Date(now);
    trainTime.setHours(h, m, 0, 0);
    const diff = Math.floor((trainTime - now) / 60000);

    let statusClass = "future";
    let displayText = x.time;

    if (diff < 0) {
      statusClass = "passed";
    } else if (diff <= 10) {
      statusClass = "soon";
      displayText = `≈ ${diff} хв`;
    }

    const id="d-"+x.number;
    container.innerHTML+=`
      <div class="train" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div style="position:relative">${x.number}${changes[x.number]?'<span class="alert-dot"></span>':''}</div>
        <div class="route-text">${x.route}</div>
        <div class="time-val ${statusClass}">${displayText}</div>
      </div>
      <div class="details" id="${id}">
        ${fullSchedules[x.number] ? renderGrid(fullSchedules[x.number]) : "Дані відсутні"}
        <div style="width:60%; height:1px; background:#fff; margin:15px auto;"></div>
        <div class="details-note">${changes[x.number] || "змін немає..."}</div>
        ${x.number === "6035" ? renderGrid(changesSchedule6035, true) : ""}
      </div>`;
  });
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>render(document.getElementById("list"), d.trains))
    .catch(e => console.log("API error"));
}

loadTrains(); updateDateTime(); loadWeather();
setInterval(loadTrains,30000); setInterval(updateDateTime,1000);
</script>

</body>
</html>
