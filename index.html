<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Vilnohirsk.online</title>

  <style>
    body {
      margin:0;
      background:#000;
      color:#00ff88;
      font-family: Arial;
      text-align:center;
    }

    h1 {
      padding:20px;
    }

    .widget {
      margin:20px auto;
      width:90%;
      max-width:600px;
      border:1px solid #00ff88;
      padding:10px;
    }
  </style>
</head>

<body>

<h1>📡 Vilnohirsk.online</h1>

<div class="widget">
  <div id="clock" style="font-size:32px; font-weight:bold;"></div>
</div>

<script>
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('uk-UA', {
    hour: '2-digit',
    minute: '2-digit'
  });
  document.getElementById('clock').innerText = time;
}
setInterval(updateClock, 1000);
updateClock();
</script>

<script>
function loadTrains() {
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("train-list");

      list.innerHTML = data.trains.map(train => `
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #00ff88; padding:8px 0;">
          <div>
            <strong>${train.type}</strong> №${train.number}<br>
            → ${train.direction}
          </div>
          <div style="font-size:18px; font-weight:bold;">
            ${train.time}
          </div>
        </div>
      `).join("");
    });
}

loadTrains();
setInterval(loadTrains, 30000);
</script>

<div class="widget">
  <div id="weather">Завантаження погоди...</div>
</div>

<script>
function loadWeather() {
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.484&longitude=34.016&current_weather=true")
    .then(res => res.json())
    .then(data => {
      const w = data.current_weather;

      let emoji = "🌤";
      if (w.weathercode > 60) emoji = "🌧";
      if (w.weathercode < 3) emoji = "☀️";

      document.getElementById("weather").innerHTML = `
        <div style="font-size:20px;">
          ${emoji} Вільногірськ<br>
          🌡 ${w.temperature}°C<br>
          💨 ${w.windspeed} км/год
        </div>
      `;
    })
    .catch(() => {
      document.getElementById("weather").innerText = "Помилка погоди";
    });
}

loadWeather();
setInterval(loadWeather, 600000); // обновление каждые 10 мин
</script>

</body>
</html>
