<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnohirsk.online</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(135deg,#1cbca4,#8bc34a);
  display:flex;
  justify-content:center;
}

.container{
  width:95%;
  max-width:900px;
  margin-top:10px;
}

/* блок */
.block{
  background:rgba(0,0,0,0.5);
  border-radius:20px;
  padding:15px;
  margin-bottom:12px;
}

/* таблица */
.table-head,
.train,
.details-row{
  display:grid;
  grid-template-columns:20% 1fr 20%;
  text-align:center;
}

.table-head{
  font-weight:bold;
  border-bottom:2px solid #aaa;
  padding-bottom:6px;
}

.train{
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.details{
  display:none;
  padding-bottom:8px;
}

.details-row div:nth-child(3){
  color:#00ff9c;
}

/* цвета времени */
.future .time{color:#00ff9c;}
.passed .time{color:#888;}
.soon .time{color:#ffcc00;}

/* примітки */
.notes{
  margin-top:10px;
}

.notes b{
  color:#ff3b3b;
}
</style>
</head>

<body>

<div class="container">

<div class="block">

<div class="table-head">
  <div>№</div>
  <div>Маршрут прямування</div>
  <div>Відпр.</div>
</div>

<div id="list"></div>

<div class="notes">
  <b>Примітки:</b><br>
  <i>Наразі жодних змін у розкладі немає...</i>
</div>

</div>

</div>

<script>

/* текущее время */
function getNow(){
  return new Date();
}

function getDiff(time){
  const now=getNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

/* данные */
const trains=[
{n:"6008",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"05:16",
d:[["Пʼятихатки-Пас.","04:43"],["Вільногірськ","05:16"],["Дніпро-Гол.","07:22"]]},
{n:"6010",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"06:01",
d:[["Пʼятихатки-Пас.","05:30"],["Вільногірськ","06:01"],["Дніпро-Гол.","08:09"]]},
{n:"6005",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"06:54",
d:[["Дніпро-Гол.","04:52"],["Вільногірськ","06:54"],["Пʼятихатки-Пас.","07:28"]]},
{n:"6018",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"09:00",
d:[["Пʼятихатки-Пас.","08:29"],["Вільногірськ","09:00"],["Дніпро-Гол.","10:57"]]},
{n:"6015",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"10:56",
d:[["Дніпро-Гол.","08:22"],["Вільногірськ","10:56"],["Пʼятихатки-Пас.","11:30"]]},
{n:"6038",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"17:23",
d:[["Пʼятихатки-Пас.","16:50"],["Вільногірськ","17:23"],["Дніпро-Гол.","19:17"]]},
{n:"6035",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"18:50",
d:[["Дніпро-Гол.","16:38"],["Вільногірськ","18:50"],["Пʼятихатки-Пас.","19:22"]]},
{n:"6037",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"19:39",
d:[["Дніпро-Гол.","17:34"],["Вільногірськ","19:39"],["Пʼятихатки-Пас.","20:14"]]},
{n:"6044",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"21:21",
d:[["Пʼятихатки-Пас.","20:37"],["Вільногірськ","21:21"],["Дніпро-Гол.","23:12"]]},
{n:"6043",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"22:22",
d:[["Дніпро-Гол.","20:18"],["Вільногірськ","22:22"],["Пʼятихатки-Пас.","23:10"]]}
];

/* рендер */
function render(){
  list.innerHTML="";

  trains.forEach(x=>{
    const diff=getDiff(x.t);
    let cls="train";
    let time=x.t;

    if(diff<0) cls+=" passed";
    else if(diff<=10){cls+=" soon"; time="≈ "+diff+" хв";}
    else cls+=" future";

    const id="d"+x.n;

    list.innerHTML+=`
    <div class="${cls}" onclick="toggle('${id}')">
      <div>${x.n}</div>
      <div>${x.r}</div>
      <div class="time">${time}</div>
    </div>

    <div class="details" id="${id}">
      ${x.d.map(s=>`
        <div class="details-row">
          <div></div>
          <div>${s[0]}</div>
          <div>${s[1]}</div>
        </div>
      `).join("")}
    </div>
    `;
  });
}

function toggle(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block"?"none":"block";
}

render();
setInterval(render,60000);

</script>

</body>
</html>
