<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Smart Вільногірськ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --highlight-color: #ffcc00; 
  --glass-bg: rgba(0, 0, 0, 0.45);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-light: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
  --time-green: #00ff9c;
  --time-passed: rgba(255, 255, 255, 0.4);
}
html, body { margin: 0; padding: 0; min-height: 100vh; color: #fff; font-family: -apple-system, sans-serif; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
body {
  background: linear-gradient(-45deg, #1e3c72, #2a5298, #009ffd, #2af598);
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
  display: flex; justify-content: center; align-items: flex-start;
}
@keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.wrapper { width: 100%; max-width: 900px; padding: 15px; }
.container { display: flex; flex-direction: column; gap: 15px; }
.liquid-glass { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; box-shadow: var(--glass-shadow); }

/* HEADER / ALERTS */
.alert-header { padding: 16px; text-align: center; cursor: pointer; border-radius: 28px; font-weight: 800; text-transform: uppercase; }
.alert-drawer { position: absolute; top: 110%; left: 0; width: 100%; max-height: 0; overflow: hidden; opacity: 0; transition: 0.5s; background: #061124; border-radius: 24px; z-index: 500; border: 1px solid rgba(255,255,255,0.1); }
.alert-drawer.open { max-height: 800px; opacity: 1; padding: 15px; }
.banner-alert-dot { width: 8px; height: 8px; background: #ff3b3b; border-radius: 50%; display: none; margin-left: 5px; }
.banner-alert-dot.active { display: inline-block; }

/* TABS */
.tabs-nav { display: flex; padding: 6px; gap: 5px; }
.tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: rgba(255,255,255,0.5); font-weight: 700; cursor: pointer; border-radius: 15px; transition: 0.3s; }
.tab-btn.active { background: rgba(255,255,255,0.15); color: #fff; }
.main-list-widget { position: absolute; top: 110%; left: 0; width: 100%; max-height: 0; overflow: hidden; opacity: 0; transition: 0.5s; background: #061124; border-radius: 24px; z-index: 400; border: 1px solid rgba(255,255,255,0.1); }
.main-list-widget.open { max-height: 1500px; opacity: 1; padding: 15px; }

/* TRANSPORT CARDS */
.train { display: grid; grid-template-columns: 60px 1fr 80px; align-items: center; padding: 15px; margin-bottom: 10px; border-radius: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
.train-num { font-weight: 800; background: rgba(255,255,255,0.1); padding: 4px; border-radius: 8px; text-align: center; font-size: 12px; }
.time-val { text-align: right; font-weight: 800; }
.time-val.passed { color: var(--time-passed); }
.time-val.future { color: var(--time-green); }
.time-val.soon { color: var(--highlight-color); }
.details { max-height: 0; overflow: hidden; transition: 0.4s; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 10px; }
.details.open { max-height: 1000px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }

/* GRID FOR STOPS */
.schedule-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
.schedule-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.row-highlight { color: var(--highlight-color); font-weight: 800; }

/* WEATHER & DATE */
.top-row { display: flex; gap: 12px; }
.widget { flex: 1; padding: 20px; text-align: center; }
#date { font-size: 22px; font-weight: 800; }
#time { font-size: 18px; opacity: 0.8; }
.weekdays { display: flex; justify-content: center; gap: 5px; margin: 10px 0; font-size: 10px; }
.day.active { color: #ff4d4d; font-weight: 800; border-bottom: 2px solid #ff4d4d; }
.weather-content { display: none; }
.weather-content.active { display: block; }

/* SHOPPING GRID */
.shops-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
@media (min-width: 600px) { .shops-grid { grid-template-columns: 1fr 1fr; } }
.shop-ad-card { border-radius: 20px; overflow: hidden; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
.shop-ad-photo { height: 180px; width: 100%; background: #000; }
.shop-ad-photo img { width: 100%; height: 100%; object-fit: cover; }
.shop-ad-info { padding: 15px; }
.shop-details-list { display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 15px; margin-top: 10px; }
.phone-list { display: flex; flex-direction: column; gap: 5px; }
.shop-phone-link { color: var(--time-green); text-decoration: none; font-weight: 800; }
.shop-map-link { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #2a5298; border-radius: 10px; text-decoration: none; color: #fff; font-size: 12px; }
</style>
</head>
<body>
<div class="wrapper">
<div class="container">

  <div class="alert-main-widget liquid-glass" style="position:relative;">
    <div class="alert-header" onclick="toggleBlock('alert-drawer')">
      ІНФОРМАЦІЙНЕ ТАБЛО <span class="banner-alert-dot" id="main-alert-dot"></span>
    </div>
    <div class="alert-drawer" id="alert-drawer">
      <div id="alert-content">Завантаження...</div>
    </div>
  </div>

  <div class="schedule-group liquid-glass" style="position:relative;">
    <div class="tabs-nav">
      <button class="tab-btn active" id="btn-trains" onclick="switchTab('trains')">Електрички</button>
      <button class="tab-btn" id="btn-long" onclick="switchTab('long')">Потяги</button>
      <button class="tab-btn" id="btn-buses" onclick="switchTab('buses')">Автобуси</button>
    </div>
    <div class="main-list-widget" id="main-list-widget">
      <div id="content-trains" class="tab-content">Завантаження...</div>
      <div id="content-long" class="tab-content" style="display:none">Завантаження...</div>
      <div id="content-buses" class="tab-content" style="display:none">Завантаження...</div>
    </div>
  </div>

  <div class="top-row">
    <div class="widget liquid-glass">
      <div id="date"></div>
      <div class="weekdays">
        <span class="day">ПН</span><span class="day">ВТ</span><span class="day">СР</span><span class="day">ЧТ</span><span class="day">ПТ</span><span class="day">СБ</span><span class="day">НД</span>
      </div>
      <div id="time"></div>
    </div>
    <div class="widget liquid-glass">
      <div id="weather-box">Завантаження...</div>
    </div>
  </div>

  <div class="shopping-widget liquid-glass">
    <div class="alert-header" onclick="toggleShopping()">
      🛍 Шопінг Вільногірська
    </div>
    <div id="shopping-drawer" style="max-height:0; overflow:hidden; transition:0.5s">
      <div id="shopping-content" style="padding:15px">Завантаження...</div>
    </div>
  </div>

</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Універсальний перемикач шторок
function toggleBlock(id) {
  const el = document.getElementById(id);
  const isTransport = id === 'main-list-widget';
  el.classList.toggle('open');
}

function toggleShopping() {
  const drawer = document.getElementById('shopping-drawer');
  drawer.style.max-height = drawer.style.max-height === '0px' ? '20000px' : '0px';
}

function switchTab(type) {
  const widget = document.getElementById('main-list-widget');
  widget.classList.add('open');
  
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  
  document.getElementById('btn-' + type).classList.add('active');
  document.getElementById('content-' + type).style.display = 'block';
}

// Рендер таблиць
function buildGrid(stops) {
  if(!stops) return "";
  return `<div class="schedule-grid">` + stops.map(s => {
    const isVil = s[0].toLowerCase().includes('вільногірськ');
    return `<div class="schedule-row ${isVil?'row-highlight':''}"><span>${s[0]}</span><b>${s[1]}</b></div>`;
  }).join('') + `</div>`;
}

// ЗАВАНТАЖЕННЯ ДАНИХ
async function loadAll() {
  // 1. Електрички
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r => r.json()).then(d => {
      document.getElementById('content-trains').innerHTML = d.trains.map(t => {
        const id = 't'+t.number;
        return `<div class="train" onclick="document.getElementById('${id}').classList.toggle('open')">
          <div class="train-num">${t.number}</div><div>${t.route}</div><div class="time-val future">${t.time}</div>
        </div><div class="details" id="${id}">${buildGrid(t.fullSchedule)}</div>`;
      }).join('');
    });

  // 2. Потяги
  fetch("https://grateful-enthusiasm-production-c1cc.up.railway.app/schedule")
    .then(r => r.json()).then(d => {
      document.getElementById('content-long').innerHTML = d.trains.map((t, i) => {
        const id = 'l'+i;
        return `<div class="train" onclick="document.getElementById('${id}').classList.toggle('open')">
          <div class="train-num">${t.number}</div><div>${t.route}</div><div class="time-val future">${t.time}</div>
        </div><div class="details" id="${id}">${buildGrid(t.stops.map(s => [s.station, s.time]))}</div>`;
      }).join('');
    });

  // 3. Автобуси
  fetch("https://vilnohirskbuses-production.up.railway.app/api/buses")
    .then(r => r.json()).then(d => {
      document.getElementById('content-buses').innerHTML = d.buses.map((b, i) => {
        const id = 'b'+i;
        const cols = b.directions.map(dir => `<div style="margin-bottom:10px"><b style="color:var(--highlight-color)">${dir.title}</b>${dir.rows.map(r => `<div class="schedule-row"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('')}</div>`).join('');
        return `<div class="train" onclick="document.getElementById('${id}').classList.toggle('open')">
          <div class="train-num">🚌</div><div>${b.route}</div><div class="time-val">Розклад</div>
        </div><div class="details" id="${id}">${cols}</div>`;
      }).join('');
    });

  // 4. Шопінг
  fetch("https://vilnohirsk-shops-production.up.railway.app/api/shops")
    .then(r => r.json()).then(d => {
      document.getElementById('shopping-content').innerHTML = `<div class="shops-grid">` + d.shops.map(s => {
        const phones = s.phone ? s.phone.split(',').map(p => `<a href="tel:${p.replace(/\D/g,'')}" class="shop-phone-link">${p.trim()}</a>`).join('') : 'Не вказано';
        return `<div class="shop-ad-card">
          <div class="shop-ad-photo">${s.photo?`<img src="${s.photo}">`:'<div style="padding:40px;opacity:0.2">ФОТО</div>'}</div>
          <div class="shop-ad-info">
            <div style="font-size:10px; color:var(--highlight-color); font-weight:800">${s.category}</div>
            <div class="shop-ad-title">${s.instagram?`<a href="${s.instagram}" target="_blank" style="color:#fff;text-decoration:none">${s.name} 🔗</a>`:s.name}</div>
            <div class="shop-details-list">
              <div class="shop-detail-item">🕒 <div><b>Графік:</b>${s.schedule.replace(/\n/g,'<br>')}</div></div>
              <div class="shop-detail-item">💳 <div>Оплата: ${s.contactless?'✅':'❌'}</div></div>
              <div class="shop-detail-item">📞 <div class="phone-list">${phones}</div></div>
              <div class="shop-detail-item">📍 <div>${s.address}<br>${s.map_link?`<a href="${s.map_link}" target="_blank" class="shop-map-link">🗺 Мапа</a>`:''}</div></div>
            </div>
          </div>
        </div>`;
      }).join('') + `</div>`;
    });

  // 5. Новини
  fetch("https://vilnohirsk-alerts-production.up.railway.app/api/alert")
    .then(r => r.json()).then(d => {
      const all = [...(d.communal||[]), ...(d.news||[])].filter(a => a.show);
      const dot = document.getElementById('main-alert-dot');
      if(all.length) {
        dot.classList.add('active');
        document.getElementById('alert-content').innerHTML = all.map(a => `<div style="margin-bottom:15px; background:rgba(255,255,255,0.1); padding:10px; border-radius:10px"><b>${a.title}</b><br>${a.text}</div>`).join('');
      } else {
        dot.classList.remove('active');
        document.getElementById('alert-content').innerHTML = "Новин немає";
      }
    });
}

// ЧАС ТА ПОГОДА
function updateTime() {
  const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Kyiv"}));
  document.getElementById('date').innerText = now.toLocaleDateString('uk-UA');
  document.getElementById('time').innerText = now.toLocaleTimeString('uk-UA');
  const days = document.querySelectorAll('.day');
  days.forEach(d => d.classList.remove('active'));
  let dIdx = now.getDay();
  days[dIdx === 0 ? 6 : dIdx - 1].classList.add('active');
}

async function loadWeather() {
  const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true");
  const d = await r.json();
  document.getElementById('weather-box').innerHTML = `<div style="font-size:12px;opacity:0.6">Вільногірськ</div><div style="font-size:28px;font-weight:800">${Math.round(d.current_weather.temperature)}°C</div>`;
}

setInterval(updateTime, 1000);
loadWeather();
loadAll();
</script>
</body>
</html>
