<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:#0b0b0b;
  padding:14px;
  border-radius:14px;
}

/* дата */
.datetime {
  text-align:center;
  color:#00ff9c;
  font-family:"Courier New";
}

/* таблица */
.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
}

.table-head {
  font-weight:700;
  border-bottom:2px solid #444;
  padding-bottom:8px;
}

.table-head div {
  text-align:center;
}

.train {
  padding:8px 0;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.train div:nth-child(1),
.details-row div:nth-child(1) {
  text-align:center;
}

.route {
  text-align:center;
}

.time-cell {
  text-align:center;
}

/* шторка */
.details {
  display:none;
  border-bottom:1px solid #222;
  padding:8px 0;
}

.details-row div:nth-child(2),
.details-row div:nth-child(3) {
  text-align:center;
}

.details-row div:nth-child(3) {
  color:#00ff9c;
}

/* цвета */
.future div { color:#00ff9c !important; }
.soon div { color:#ffcc00 !important; }
.passed div { color:#555 !important; }

/* примітки */
.notes-title {
  margin-top:10px;
  color:#ff3b3b;
  font-weight:bold;
}

.notes-text {
  color:#00ff9c;
  font-style:italic;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="widget">
  <div class="datetime">
    <div id="date"></div>
    <div id="time"></div>
  </div>
</div>

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут прямування</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>

  <div class="notes-title">Примітки:</div>
  <div class="notes-text">
    Наразі жодних змін у розкладі та скасувань приміських електропоїздів немає...
  </div>
</div>

</div>
</div>

<script>
let opened = null;

function toggle(id){
  const el = document.getElementById(id);

  // если клик по уже открытому — закрываем
  if(opened === id){
    el.style.display = "none";
    opened = null;
    return;
  }

  // закрыть предыдущий
  if(opened){
    const prev = document.getElementById(opened);
    if(prev) prev.style.display = "none";
  }

  // открыть новый
  el.style.display = "block";
  opened = id;
}

function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();
  document.getElementById("date").textContent =
    `${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  document.getElementById("time").textContent =
    `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}

function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

const order = ["6008","6010","6005","6018","6015","6038","6035","6037","6044","6043"];

const schedules = {
  "6008":[["Пʼятихатки-Пас.","04:43"],["Вільногірськ","05:16"],["Верхівцеве","05:35"],["Верхньодніпровськ","06:15"],["Камʼянське-Пас.","06:42"],["Дніпро-Гол. (прибуття)","07:22"]],
  "6010":[["Пʼятихатки-Пас.","05:30"],["Вільногірськ","06:01"],["Верхівцеве","06:19"],["Верхньодніпровськ","06:38"],["Камʼянське-Пас.","07:17"],["Дніпро-Гол. (прибуття)","08:09"]],
  "6005":[["Дніпро-Гол.","04:52"],["Камʼянське-Пас.","05:48"],["Верхньодніпровськ","06:14"],["Верхівцеве","06:33"],["Вільногірськ","06:54"],["Пʼятихатки-Пас. (прибуття)","07:28"]],
  "6018":[["Пʼятихатки-Пас.","08:29"],["Вільногірськ","09:00"],["Верхівцеве","09:21"],["Верхньодніпровськ","09:40"],["Камʼянське-Пас.","10:04"],["Дніпро-Гол. (прибуття)","10:57"]],
  "6015":[["Дніпро-Гол.","08:22"],["Камʼянське-Пас.","09:20"],["Верхньодніпровськ","09:46"],["Верхівцеве","10:35"],["Вільногірськ","10:56"],["Пʼятихатки-Пас. (прибуття)","11:30"]],
  "6038":[["Пʼятихатки-Пас.","16:50"],["Вільногірськ","17:23"],["Верхівцеве","17:44"],["Верхньодніпровськ","18:03"],["Камʼянське-Пас.","18:27"],["Дніпро-Гол. (прибуття)","19:17"]],
  "6035":[["Дніпро-Гол.","16:38"],["Камʼянське-Пас.","17:44"],["Верхньодніпровськ","18:10"],["Верхівцеве","18:29"],["Вільногірськ","18:50"],["Пʼятихатки-Пас. (прибуття)","19:22"]],
  "6037":[["Дніпро-Гол.","17:34"],["Камʼянське-Пас.","18:33"],["Верхньодніпровськ","18:59"],["Верхівцеве","19:18"],["Вільногірськ","19:39"],["Пʼятихатки-Пас. (прибуття)","20:14"]],
  "6044":[["Пʼятихатки-Пас.","20:37"],["Вільногірськ","21:21"],["Верхівцеве","21:40"],["Верхньодніпровськ","21:58"],["Камʼянське-Пас.","22:22"],["Дніпро-Гол. (прибуття)","23:12"]],
  "6043":[["Дніпро-Гол.","20:18"],["Камʼянське-Пас.","21:16"],["Верхньодніпровськ","21:42"],["Верхівцеве","22:01"],["Вільногірськ","22:22"],["Пʼятихатки-Пас. (прибуття)","23:10"]]
};

function render(el,data){
  data.sort((a,b)=> order.indexOf(a.number)-order.indexOf(b.number));
  el.innerHTML="";

  data.forEach(x=>{
    const diff=getDiff(x.time);
    let cls="train";
    let label=x.time;

    if(diff<0) cls+=" passed";
    else if(diff<=10){ cls+=" soon"; label="≈ "+diff+" хв"; }
    else cls+=" future";

    const id="d-"+x.number;

    el.innerHTML+=`
    <div class="${cls}" onclick="toggle('${id}')">
      <div>${x.number}</div>
      <div class="route">${x.route}</div>
      <div class="time-cell">${label}</div>
    </div>`;

    if(schedules[x.number]){
      el.innerHTML+=`<div class="details" id="${id}">`;

      schedules[x.number].forEach(r=>{
        el.innerHTML+=`
        <div class="details-row">
          <div></div>
          <div>${r[0]}</div>
          <div>${r[1]}</div>
        </div>`;
      });

      el.innerHTML+=`</div>`;
    }
  });
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>render(document.getElementById("list"),d.trains));
}

loadTrains();
updateDateTime();
setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
