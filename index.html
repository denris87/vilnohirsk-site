<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  user-select: none;
  box-sizing: border-box;
}

body {
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  background: linear-gradient(-45deg, #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,#a5ca49,#8cc454,#41bc81,#74bf54,#53bc67);
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  align-items: stretch;
}

.widget {
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 16px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

@media (max-width: 480px) {
  .top-row { gap: 5px; }
  .widget { padding: 5px; border-radius: 12px; min-height: 110px; }
}

.datetime {
  text-align:center;
  font-family:"Courier New", monospace;
}

#date, #time {
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight:900;
}

.weekdays {
  display:flex;
  justify-content:center;
  gap:3px;
  font-size: clamp(10px, 2.5vw, 12px);
  font-weight:900;
  margin: 4px 0;
}

.day.active {
  background:red;
  border-radius:4px;
  padding: 0 3px;
}

.slide-content {
  position: absolute;
  width: calc(100% - 20px);
  left: 10px;
  transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
  opacity: 0;
  transform: translateY(15px);
  pointer-events: none;
}

.slide-content.active {
  position: relative;
  left: 0;
  width: 100%;
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.info-title {
  text-align:center; 
  font-size:10px; 
  margin-bottom: 5px;
  text-transform: uppercase;
  color: #aaa;
}

.data-item {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 2px 0;
  font-size: clamp(11px, 2.8vw, 13px);
}

.data-name { font-weight: bold; color: #f1df30; display: flex; align-items: center; gap: 3px; }
.data-val { font-family: monospace; }

.weather {
  text-align:center;
}

.weather-city { font-weight:bold; font-size: 12px; margin-bottom: 2px; }
.weather-temp { font-size: clamp(16px, 4vw, 20px); font-weight:bold; }

.train-list-widget {
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 16px;
}

.table-head {
  font-weight:700;
  border-bottom:2px solid #aaa;
  padding-bottom:8px;
  display:grid;
  grid-template-columns: 15% 1fr 20%;
  justify-items:center;
  font-size: 14px;
}

.train {
  display:grid;
  grid-template-columns: 15% 1fr 20%;
  align-items:center;
  justify-items:center;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.details {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:all 0.4s ease;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.details.open {
  max-height:5000px;
  opacity:1;
  padding:10px;
  margin-top: 5px;
}

.details-note {
  text-align:center;
  font-weight:bold;
  color: #ff4d4d; 
  margin: 10px 0;
}

.schedule-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

@media (max-width:600px){ .schedule-grid { grid-template-columns:1fr; } }

.schedule-row {
  display:flex;
  justify-content:space-between;
  padding:3px 0;
  border-bottom:1px dashed rgba(255,255,255,0.2);
  font-size:11px;
}

.station-number { color:#ffcc00; font-weight:bold; margin-right:4px; }
.time-green { color:#00ff9c; font-weight:bold; }
.time-passed { color:#888; }

.alert-dot {
  position:absolute;
  top:-2px; right:-5px;
  width:6px; height:6px;
  background:#ff3b3b;
  border-radius:50%;
  animation: blink 1s infinite;
}

@keyframes blink { 0%,100% {opacity:1;} 50% {opacity:0;} }
</style>
</head>

function getKyivNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function isPast(time){
  if(time === "---" || time === "—") return false;
  const now = getKyivNow();
  const [h, m] = time.split(":").map(Number);
  const t = new Date(now);
  t.setHours(h, m, 0, 0);
  return t < now;
}

// Загрузка валют с Монобанка
async function loadCurrencies() {
  try {
    const r = await fetch('https://api.monobank.ua/bank/currency');
    const d = await r.json();
    const usd = d.find(x => x.currencyCodeA === 840 && x.currencyCodeB === 980);
    const eur = d.find(x => x.currencyCodeA === 978 && x.currencyCodeB === 980);
    const pln = d.find(x => x.currencyCodeA === 985 && x.currencyCodeB === 980);
    if(usd) document.getElementById('usd-val').textContent = `${usd.rateBuy.toFixed(2)} / ${usd.rateSell.toFixed(2)}`;
    if(eur) document.getElementById('eur-val').textContent = `${eur.rateBuy.toFixed(2)} / ${eur.rateSell.toFixed(2)}`;
    if(pln) document.getElementById('pln-val').textContent = `${pln.rateBuy.toFixed(2)} / ${pln.rateSell.toFixed(2)}`;
  } catch(e) {}
}

function initSlider() {
  const slides = [document.getElementById('slide-fuel'), document.getElementById('slide-currency')];
  let cur = 0;
  setInterval(() => {
    slides[cur].classList.remove('active');
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add('active');
  }, 7000);
}

function renderGrid(data, isChanges = false){
  let i = 1;
  const cols = [];
  for(let j=0; j<data.length; j+=10){ cols.push(data.slice(j, j+10)); }
  return `
    <div class="schedule-grid">
      ${cols.map(col=>`
        <div class="schedule-column">
          ${col.map(r=>{
            const passed = isPast(r[1]);
            const timeClass = passed ? 'time-passed' : 'time-green';
            return `<div class="schedule-row">
              <span><span class="station-number" style="${isChanges ? 'color:#fff' : ''}">${i++}.</span>${r[0]}</span>
              <span class="${timeClass}">${r[1]}</span>
            </div>`;
          }).join("")}
        </div>
      `).join("")}
    </div>
  `;
}

function getWeatherEmoji(code){
  if(code === 0) return "☀️";
  if(code <= 2) return "⛅";
  if(code <= 3) return "☁️";
  if(code <= 48) return "🌫️";
  if(code <= 67) return "🌧️";
  if(code <= 77) return "🌨️";
  if(code <= 99) return "⛈️";
  return "🌡️";
}

function loadWeather(){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true&timezone=Europe%2FKyiv`)
  .then(r=>r.json())
  .then(d=>{
    const w=d.current_weather;
    const emoji = getWeatherEmoji(w.weathercode);
    document.getElementById("weather").innerHTML=`
      <div class="weather-city">Вільногірськ</div>
      <div class="weather-temp">${emoji} ${Math.round(w.temperature)}°C</div>
      <div style="font-size:11px;">💨 ${Math.round(w.windspeed)} м/с</div>
    `;
  });
}

function updateDateTime(){
  const now=getKyivNow();
  document.getElementById("date").textContent=`${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  document.getElementById("time").textContent=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
  const days=document.querySelectorAll(".day");
  days.forEach(d=>d.classList.remove("active"));
  let i=now.getDay(); i=i===0?6:i-1;
  days[i].classList.add("active");
}

function render(el,data){
  data.sort((a,b)=>order.indexOf(a.number)-order.indexOf(b.number));
  el.innerHTML=`<div class="table-head"><div>№</div><div>Маршрут прямування</div><div>Відпр.</div></div><div id="trains-content"></div>`;
  const container = document.getElementById('trains-content');
  data.forEach(x=>{
    const diff = Math.floor((new Date(getKyivNow().setHours(...x.time.split(':'),0,0)) - getKyivNow())/60000);
    let cls="train " + (diff < 0 ? "passed" : (diff <= 10 ? "soon" : "future"));
    const id="d-"+x.number;
    container.innerHTML+=`
      <div class="${cls}" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div style="position:relative">${x.number}${changes[x.number]?'<span class="alert-dot"></span>':''}</div>
        <div style="font-weight:600; text-align:center">${x.route}</div>
        <div style="font-weight:bold">${diff>=0 && diff<=10 ? '≈ '+diff+' хв' : x.time}</div>
      </div>
      <div class="details" id="${id}">
        ${renderGrid(fullSchedules[x.number])}
        <div style="width:60%; height:1px; background:#fff; margin:15px auto;"></div>
        <div class="details-note">${changes[x.number] || "змін немає..."}</div>
        ${x.number === "6035" ? renderGrid(changesSchedule6035, true) : ""}
      </div>`;
  });
}
