<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Вільногірськ Онлайн</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  user-select: none;
  box-sizing: border-box;
}

body {
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  background: linear-gradient(-45deg, #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,#a5ca49,#8cc454,#41bc81,#74bf54,#53bc67);
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Верхние блоки: 1 линия */
.top-row {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  gap: 8px;
  width: 100%;
}

.widget {
  background: rgba(0,0,0,0.6);
  padding: 10px 6px;
  border-radius: 12px;
  flex: 1;
  min-width: 0;
  min-height: 110px; /* Увеличил высоту для крупных шрифтов */
  display: flex;
  flex-direction: column;
  justify-content: center; /* Центрирование по вертикали */
  align-items: center;
}

/* Дата, время, дни — КРУПНО */
.datetime { text-align:center; font-family:"Courier New", monospace; width: 100%; }
#date { 
  font-size: clamp(18px, 4.8vw, 26px); 
  font-weight: 900; 
  white-space: nowrap;
}
#time { 
  font-size: clamp(16px, 4.2vw, 22px); 
  font-weight: 900; 
  white-space: nowrap;
}

.weekdays {
  display:flex;
  justify-content:center;
  gap:3px;
  font-size: clamp(10px, 2.5vw, 13px);
  font-weight:900;
  margin: 5px 0;
}
.day.active { background:red; border-radius:4px; padding: 0 4px; }

/* Погода — ВЫРАВНИВАНИЕ */
.weather-box { 
  position: relative; 
  width: 100%; 
  height: 100%; /* Занимает всю высоту виджета */
  display: flex;
  align-items: center;
  justify-content: center;
}
.weather-content {
  position: absolute;
  width: 100%;
  transition: all 0.6s ease-in-out;
  opacity: 0;
  text-align: center;
  /* Убрал лишние отступы, чтобы не съезжало вниз */
}
.weather-content.active { opacity: 1; }
.weather-city { font-weight:bold; font-size: 12px; color: #04b6cb; margin-bottom: 2px; }
.weather-temp { font-size: clamp(18px, 5vw, 24px); font-weight:bold; white-space: nowrap; }
.weather-wind { font-size: 10px; color: #aaa; }

/* Таблица */
.train-list-widget {
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:16px;
}

.table-head, .train {
  display: grid;
  grid-template-columns: 15% 1fr 20%;
  align-items: center;
  justify-items: center;
}

.table-head {
  font-weight: 700;
  border-bottom: 2px solid #aaa;
  padding-bottom: 8px;
  font-size: 13px;
}

.train {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
}

.route-text {
  font-weight: 600;
  text-align: center;
  font-size: clamp(12px, 3.5vw, 16px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  padding: 0 5px;
}

.time-val {
  font-weight: bold;
  font-size: clamp(14px, 3.8vw, 18px);
}

.details {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 0.4s ease;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

.details.open {
  max-height: 5000px;
  opacity: 1;
  padding: 10px;
  margin: 5px 0;
}

.details-note {
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
  color: #ff4d4d;
  text-shadow: 0 0 5px rgba(0,0,0,0.5);
}

.schedule-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

@media (max-width: 600px) { .schedule-grid { grid-template-columns: 1fr; } }

.schedule-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px dashed rgba(255,255,255,0.2);
  font-size: 12px;
}

.station-number { color: #ffcc00; font-weight: bold; margin-right: 4px; }
.time-green { color: #00ff9c; font-weight: bold; }
.time-passed { color: #888; }
.time-normal { color: #fff; font-weight: normal; }

.alert-dot {
  position: absolute;
  top: -4px; right: -8px;
  width: 7px; height: 7px;
  background: #ff3b3b;
  border-radius: 50%;
  animation: blink 1s infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>

function getKyivNow(){ return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"})); }

function isPast(time){
  if(time === "---" || time === "—") return false;
  const now = getKyivNow();
  const [h, m] = time.split(":").map(Number);
  const t = new Date(now); t.setHours(h, m, 0, 0);
  return t < now;
}

function getWeatherEmoji(code){
  if(code === 0) return "☀️";
  if(code <= 2) return "⛅";
  if(code <= 3) return "☁️";
  if(code <= 48) return "🌫️";
  if(code <= 67) return "🌧️";
  if(code <= 77) return "🌨️";
  if(code <= 99) return "⛈️";
  return "🌡️";
}

async function loadWeather(){
  const coords = [{id: 'vil', lat: 48.48, lon: 34.02}, {id: 'dni', lat: 48.45, lon: 34.98}];
  let results = [];
  for(let c of coords){
    try {
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true&timezone=Europe%2FKyiv`);
      const d = await r.json();
      results.push({name: c.id === 'vil' ? 'Вільногірськ' : 'Дніпро', w: d.current_weather});
    } catch(e) {}
  }
  
  const el = document.getElementById("weather");
  let cur = 0;
  function updateSlide() {
    const item = results[cur];
    if(item){
      el.innerHTML = `
        <div class="weather-content active">
          <div class="weather-city">${item.name}</div>
          <div class="weather-temp">${getWeatherEmoji(item.w.weathercode)} ${Math.round(item.w.temperature)}°C</div>
          <div class="weather-wind">💨 ${Math.round(item.w.windspeed)} м/с</div>
        </div>
      `;
    }
    cur = (cur + 1) % results.length;
  }
  updateSlide();
  setInterval(updateSlide, 7000);
}

function updateDateTime(){
  const now=getKyivNow();
  document.getElementById("date").textContent=`${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  document.getElementById("time").textContent=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
  const days=document.querySelectorAll(".day");
  days.forEach(d=>d.classList.remove("active"));
  let i=now.getDay(); i=i===0?6:i-1;
  days[i].classList.add("active");
}

function renderGrid(data, isChanges = false){
  let i = 1; const cols = [];
  for(let j=0; j<data.length; j+=10){ cols.push(data.slice(j, j+10)); }
  return `
    <div class="schedule-grid">
      ${cols.map(col=>`
        <div class="schedule-column" style="background:rgba(255,255,255,0.1); border-radius:8px; padding:5px;">
          ${col.map(r=>{
            const passed = isPast(r[1]);
            return `<div class="schedule-row">
              <span class="station-name"><span class="station-number">${i++}.</span>${r[0]}</span>
              <span class="${isChanges ? 'time-normal' : (passed ? 'time-passed' : 'time-green')}">${r[1]}</span>
            </div>`;
          }).join("")}
        </div>
      `).join("")}
    </div>
  `;
}

function render(el,data){
  data.sort((a,b)=>order.indexOf(a.number)-order.indexOf(b.number));
  el.innerHTML=`<div class="table-head"><div>№</div><div>Маршрут прямування</div><div>Відпр.</div></div><div id="trains-content"></div>`;
  const container = document.getElementById('trains-content');
  data.forEach(x=>{
    const diff = Math.floor((new Date(getKyivNow().setHours(...x.time.split(':'),0,0)) - getKyivNow())/60000);
    let cls="train " + (diff < 0 ? "passed" : (diff <= 10 ? "soon" : "future"));
    const id="d-"+x.number;
    container.innerHTML+=`
      <div class="${cls}" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div style="position:relative">${x.number}${changes[x.number]?'<span class="alert-dot"></span>':''}</div>
        <div class="route-text">${x.route}</div>
        <div class="time-val">${diff>=0 && diff<=10 ? '≈ '+diff+' хв' : x.time}</div>
      </div>
      <div class="details" id="${id}">
        ${renderGrid(fullSchedules[x.number])}
        <div style="width:60%; height:1px; background:#fff; margin:15px auto;"></div>
        <div class="details-note">${changes[x.number] || "змін немає..."}</div>
        ${x.number === "6035" ? renderGrid(changesSchedule6035, true) : ""}
      </div>`;
  });
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains").then(r=>r.json()).then(d=>render(list,d.trains));
}

loadTrains(); updateDateTime(); loadWeather();
setInterval(loadTrains,30000); setInterval(updateDateTime,1000);
</script>
