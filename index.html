<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnohirsk.online</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(135deg,#1cbca4,#8bc34a);
  display:flex;
  justify-content:center;
}

.container{
  width:95%;
  max-width:900px;
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.block{
  background:rgba(0,0,0,0.5);
  border-radius:20px;
  padding:15px;
}

/* верх */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* дата */
.date-block{text-align:center;}
.time{font-size:22px;margin-top:5px}

/* дни */
.week{
  display:flex;
  justify-content:center;
  gap:6px;
  margin:5px 0;
}
.day{padding:4px 6px;border-radius:6px}
.active{background:red}

/* погода */
.weather{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* вкладки */
.tabs{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}
.tab{
  flex:1;
  text-align:center;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.tab.active{background:#ff2b2b}

/* таблица */
.table-head,.train,.details-row{
  display:grid;
  grid-template-columns:20% 1fr 20%;
  text-align:center;
}

.table-head{
  border-bottom:2px solid #aaa;
  padding-bottom:5px;
  font-weight:bold;
}

.train{
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.details{display:none}

/* цвета */
.future .time{color:#00ff9c}
.passed .time{color:#888}
.soon .time{color:#ffcc00}

/* скрытые блоки */
.section{display:none}
.section.active{display:block}

/* инфо */
.info-title{
  text-align:center;
  color:#ff3b3b;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- верх -->
<div class="top">

<div class="block date-block">
  <div id="date"></div>

  <div class="week">
    <div class="day">пн</div>
    <div class="day">вт</div>
    <div class="day">ср</div>
    <div class="day">чт</div>
    <div class="day">пт</div>
    <div class="day">сб</div>
    <div class="day">нд</div>
  </div>

  <div class="time" id="time"></div>
</div>

<div class="block weather" id="weather"></div>

</div>

<!-- информация -->
<div class="block">
  <div class="info-title">інформація</div>
</div>

<!-- расписание -->
<div class="block">

<div class="tabs">
  <div class="tab active" onclick="switchTab('electric',this)">Електрички</div>
  <div class="tab" onclick="switchTab('train',this)">Потяги</div>
  <div class="tab" onclick="switchTab('bus',this)">Автобуси</div>
</div>

<!-- ЭЛЕКТРИЧКИ -->
<div id="electric" class="section active">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>

  <br>
  <b style="color:#ff3b3b">Примітки:</b><br>
  <i>Наразі жодних змін у розкладі немає...</i>
</div>

<!-- ПОТЯГИ -->
<div id="train" class="section">Немає даних</div>

<!-- АВТОБУСЫ -->
<div id="bus" class="section">Немає даних</div>

</div>

</div>

<script>

/* вкладки */
function switchTab(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* время */
function updateTime(){
  const now=new Date();

  date.textContent=now.toLocaleDateString("uk-UA");
  time.textContent=now.toLocaleTimeString("uk-UA");

  const days=document.querySelectorAll(".day");
  days.forEach(d=>d.classList.remove("active"));

  let i=now.getDay();
  i=i===0?6:i-1;
  days[i].classList.add("active");
}
setInterval(updateTime,1000);
updateTime();

/* погода */
fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true")
.then(r=>r.json())
.then(d=>{
  const w=d.current_weather;
  weather.innerHTML=`
    <div>Вільногірськ</div>
    <div style="font-size:26px;font-weight:bold;">🌤 ${Math.round(w.temperature)}°C</div>
    <div>💨 ${Math.round(w.windspeed)} м/с</div>
  `;
});

/* поезда */
const trains=[
{n:"6008",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"05:16"},
{n:"6010",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"06:01"},
{n:"6005",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"06:54"},
{n:"6018",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"09:00"},
{n:"6015",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"10:56"},
{n:"6038",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"17:23"},
{n:"6035",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"18:50"},
{n:"6037",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"19:39"},
{n:"6044",r:"П'ятихатки-Пас. → Дніпро-Гол.",t:"21:21"},
{n:"6043",r:"Дніпро-Гол. → П'ятихатки-Пас.",t:"22:22"}
];

function getDiff(t){
  const now=new Date();
  const [h,m]=t.split(":");
  const d=new Date();
  d.setHours(h,m,0,0);
  return (d-now)/60000;
}

function render(){
  list.innerHTML="";

  trains.forEach(x=>{
    let cls="train";
    let label=x.t;
    let diff=getDiff(x.t);

    if(diff<0) cls+=" passed";
    else if(diff<10){cls+=" soon";label="≈ "+Math.floor(diff)+" хв";}
    else cls+=" future";

    const id="d"+x.n;

    list.innerHTML+=`
    <div class="${cls}" onclick="toggle('${id}')">
      <div>${x.n}</div>
      <div>${x.r}</div>
      <div class="time">${label}</div>
    </div>
    <div class="details" id="${id}">
      <div class="details-row"><div></div><div>Вільногірськ</div><div>${x.t}</div></div>
    </div>
    `;
  });
}

function toggle(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block"?"none":"block";
}

render();
setInterval(render,60000);

</script>

</body>
</html>
