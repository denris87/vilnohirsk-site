<script>
// ⏰ Киевское время
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "Europe/Kyiv" }));
}

let blink = true;

function updateClocks() {
  const now = getKyivNow();

  let h = String(now.getHours()).padStart(2, "0");
  let m = String(now.getMinutes()).padStart(2, "0");

  const separator = blink ? ":" : " ";
  blink = !blink;

  const time = h + separator + m;

  document.getElementById("clock1").textContent = time;
  document.getElementById("clock2").textContent = time;
}

// разница времени
function getDiff(time) {
  if (!time || time === "—") return -999;

  const now = getKyivNow();
  const [h, m] = time.split(":").map(Number);

  const t = new Date(now);
  t.setHours(h, m, 0, 0);

  return Math.floor((t - now) / 60000);
}

// рендер
function render(list, data) {
  const arr = data
    .map(x => ({ ...x, diff: getDiff(x.time) }))
    .sort((a, b) => a.time.localeCompare(b.time));

  const next = arr.find(x => x.diff >= 0);

  list.innerHTML = "";

  arr.forEach(x => {
    let cls = "time";
    let label = x.time || "—";

    if (x.diff < 0) cls += " passed";

    if (x.diff >= 0 && x.diff <= 10) {
      cls += " soon";
      label = "≈ " + x.diff + " хв";
    }

    if (next && x.number === next.number) cls += " next";

    const el = document.createElement("div");
    el.className = "train";

    el.innerHTML = `
      <div>№${x.number}</div>
      <div class="route">${x.route || x.direction || ""}</div>
      <div class="${cls}">${label}</div>
    `;

    list.appendChild(el);
  });
}

// 🚆 загрузка
function loadTrains() {
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(res => res.json())
    .then(data => {

      // универсально (работает с любой структурой)
      const dnipro = data.trains.filter(t =>
        (t.route && t.route.includes("Дніпро")) ||
        (t.direction && t.direction.includes("Дніпро"))
      );

      const pyat = data.trains.filter(t =>
        (t.route && t.route.includes("П'ятихатки")) ||
        (t.direction && t.direction.includes("П'ятихатки"))
      );

      render(document.getElementById("list1"), dnipro);
      render(document.getElementById("list2"), pyat);
    })
    .catch(() => {
      document.getElementById("list1").innerText = "Помилка";
      document.getElementById("list2").innerText = "Помилка";
    });
}

// 🌦 погода
function loadWeather() {
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.484&longitude=34.016&current_weather=true")
    .then(res => res.json())
    .then(data => {
      const w = data.current_weather;

      document.getElementById("weather").innerHTML = `
        🌦 Вільногірськ<br>
        🌡 ${w.temperature}°C<br>
        💨 ${w.windspeed} км/год
      `;
    });
}

// запуск
loadTrains();
loadWeather();
updateClocks();

setInterval(loadTrains, 30000);
setInterval(loadWeather, 600000);
setInterval(updateClocks, 1000);
</script>
