<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  user-select: none;
}

body {
  color:#fff;
  font-family:Arial;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  min-height:100vh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,
    #a5ca49,#8cc454,#41bc81,#74bf54,#53bc67
  );
  background-size:400% 400%;
  background-attachment: fixed;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
  padding-bottom: calc(20px + var(--safe-bottom));
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-row {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  padding:14px;
  border-radius:16px;
}

/* таблица */
.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
  justify-items:center;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.details {
  display:none;
  padding:10px 0;
}

.details-divider {
  grid-column: 1 / -1;
  width:100%;
  height:1px;
  background:#fff;
  margin:10px 0;
}

.details-note {
  grid-column: 1 / -1;
  width:100%;
  text-align:left;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>
</div>

</div>
</div>

<script>

/* 🔥 ДОБАВИЛИ ИЗМЕНЕНИЯ */
const changes = {
  "6008": "Запізнення +10 хв",
  "6010": "Скасовано",
  // остальные поезда без изменений
};

const schedules={
  "6008":[["Пʼятихатки-Пас.","04:43"],["Вільногірськ","05:16"]],
  "6010":[["Пʼятихатки-Пас.","05:30"],["Вільногірськ","06:01"]]
};

function render(el,data){
  el.innerHTML="";

  data.forEach(x=>{
    const id="d-"+x.number;

    el.innerHTML+=`
      <div class="train" onclick="toggle('${id}')">
        <div>${x.number}</div>
        <div>${x.route}</div>
        <div>${x.time}</div>
      </div>
    `;

    if(schedules[x.number]){
      const note = changes[x.number] ? changes[x.number] : "змін немає...";

      el.innerHTML+=`
      <div class="details" id="${id}">
        ${schedules[x.number].map(s=>`
          <div class="details-row">
            <div></div>
            <div>${s[0]}</div>
            <div>${s[1]}</div>
          </div>
        `).join("")}

        <div class="details-divider"></div>
        <div class="details-note">${note}</div>
      </div>`;
    }
  });
}

function toggle(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block"?"none":"block";
}

/* пример данных */
render(list,[
  {number:"6008",route:"Пʼятихатки → Дніпро",time:"05:16"},
  {number:"6010",route:"Пʼятихатки → Дніпро",time:"06:01"}
]);

</script>

</body>
</html>
