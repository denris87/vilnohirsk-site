<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:#0b0b0b;
  padding:14px;
  border-radius:14px;
}

/* дата */
.datetime {
  text-align:center;
  color:#00ff9c;
  font-family:"Courier New";
}

.date {
  font-size: clamp(28px, 6vw, 60px);
  font-weight:bold;
}

.time {
  font-size: clamp(18px, 4vw, 36px);
}

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
}

.table-head {
  font-size: clamp(13px, 3vw, 22px);
  font-weight:700;
  color:#ffffff;
  border-bottom:2px solid #444;
  padding-bottom:8px;
  text-shadow:0 0 6px rgba(255,255,255,0.2);
}

.table-head div {
  text-align:center;
}

.train {
  padding:10px 0;
  border-bottom:1px solid #222;
  font-size: clamp(14px, 3.5vw, 26px);
  cursor:pointer;
}

.train:hover {
  background:rgba(255,255,255,0.05);
}

/* шторка */
.dropdown {
  display:none;
  padding:10px;
  margin:6px 0;
  background:#111;
  border-left:3px solid #00ff9c;
  font-size: clamp(13px, 3vw, 20px);
  line-height:1.6;
  color:#ccc;
}

/* колонки */
.train div:nth-child(1),
.time-cell {
  text-align:center;
}

.route {
  text-align:center;
  word-break:break-word;
}

/* цвета */
.future div { color:#00ff9c !important; }
.soon div { color:#ffcc00 !important; }
.passed div { color:#555 !important; }

/* приметки */
.notes-title {
  margin-top:10px;
  color:#ff3b3b;
  font-weight:bold;
}

.notes-text {
  margin-top:6px;
  color:#00ff9c;
  font-style:italic;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="widget">
  <div class="datetime">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
  </div>
</div>

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут прямування</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>

  <div class="notes-title">Примітки:</div>
  <div class="notes-text">
    Наразі жодних змін у розкладі та скасувань приміських електропоїздів немає...
  </div>
</div>

</div>
</div>

<script>
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();
  const d = String(now.getDate()).padStart(2,"0");
  const m = String(now.getMonth()+1).padStart(2,"0");
  const y = now.getFullYear();
  const h = String(now.getHours()).padStart(2,"0");
  const min = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  date.textContent = `${d}.${m}.${y}`;
  time.textContent = `${h}:${min}:${s}`;
}

function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

const order = ["6008","6010","6005","6018","6015","6038","6035","6037","6044","6043"];

function toggle(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function render(el,data){
  data.sort((a,b)=> order.indexOf(a.number) - order.indexOf(b.number));
  el.innerHTML="";

  data.forEach(x=>{
    const diff = getDiff(x.time);
    let cls="train";
    let label=x.time;

    if(diff < 0){ cls+=" passed"; }
    else if(diff <= 10){ cls+=" soon"; label="≈ "+diff+" хв"; }
    else { cls+=" future"; }

    const is6008 = x.number === "6008";

    el.innerHTML+=`
      <div>
        <div class="${cls}" onclick="${is6008 ? "toggle('d6008')" : ""}">
          <div>${x.number}</div>
          <div class="route">${x.route}</div>
          <div class="time-cell">${label}</div>
        </div>

        ${is6008 ? `
        <div class="dropdown" id="d6008">
          Пʼятихатки-Пас. — 04:43<br>
          Вільногірськ — 05:16<br>
          Верхівцеве — 05:35<br>
          Верхньодніпровськ — 06:15<br>
          Камʼянське-Пас. — 06:42<br>
          Дніпро-Гол. — 07:22 (прибуття)
        </div>` : ""}
      </div>
    `;
  });
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=> render(list, d.trains));
}

loadTrains();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
