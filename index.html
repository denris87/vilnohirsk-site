<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:850px;
  padding:20px 10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:16px;
}

.widget {
  background:#0b0b0b;
  padding:14px;
  border-radius:16px;
  box-shadow:0 0 10px rgba(0,255,156,0.1);
}

/* ПОГОДА */
.weather-box {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weather {
  font-size:20px;
  color:#00ff9c;
}

.datetime {
  text-align:right;
  color:#00ff9c;
  font-family:"Courier New";
}

.date {
  font-size:14px;
}

.time {
  font-size:22px;
  font-weight:bold;
}

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns: 60px 1fr 70px;
  align-items:center;
}

.table-head {
  font-size:11px;
  color:#777;
  border-bottom:1px solid #333;
  padding-bottom:4px;
}

.train {
  padding:6px 0;
  border-bottom:1px solid #222;
}

.route {
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.time-cell {
  text-align:right;
  font-weight:bold;
}

/* цвета */
.next { color:#00ff9c; }
.train.next div { color:#00ff9c !important; }

.soon { color:#ffcc00; }
.passed { color:#555; }
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<!-- 🌦 ПОГОДА + ДАТА -->
<div class="widget">
  <div class="weather-box">
    <div class="weather" id="weather">Завантаження...</div>
    <div class="datetime">
      <div class="date" id="date"></div>
      <div class="time" id="time"></div>
    </div>
  </div>
</div>

<!-- 🚆 П'ятихатки → Дніпро -->
<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list1"></div>
</div>

<!-- 🚆 Дніпро → П'ятихатки -->
<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list2"></div>
</div>

</div>
</div>

<script>
// Киев время
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

// дата и часы с секундами
function updateDateTime() {
  const now = getKyivNow();

  const d = String(now.getDate()).padStart(2,"0");
  const m = String(now.getMonth()+1).padStart(2,"0");
  const y = now.getFullYear();

  const h = String(now.getHours()).padStart(2,"0");
  const min = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  document.getElementById("date").textContent = `${d}.${m}.${y}`;
  document.getElementById("time").textContent = `${h}:${min}:${s}`;
}

// разница
function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

// рендер
function render(el,data){
  const arr=data.map(x=>({...x,diff:getDiff(x.time)}));
  const next=arr.find(x=>x.diff>=0);

  el.innerHTML="";

  arr.forEach(x=>{
    let rowClass="train";
    let timeClass="time-cell";
    let label=x.time;

    if(x.diff<0) timeClass+=" passed";

    if(x.diff>=0 && x.diff<=10){
      timeClass+=" soon";
      label="≈ "+x.diff+" хв";
    }

    if(next && x.number===next.number){
      rowClass+=" next";
    }

    el.innerHTML+=`
      <div class="${rowClass}">
        <div>№${x.number}</div>
        <div class="route">${x.route}</div>
        <div class="${timeClass}">${label}</div>
      </div>`;
  });
}

// поезда
function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>{
      const dnipro=d.trains.filter(t=>t.direction.includes("Дніпро"));
      const pyat=d.trains.filter(t=>t.direction.includes("П'ятихатки"));

      render(document.getElementById("list1"),dnipro);
      render(document.getElementById("list2"),pyat);
    });
}

// погода
function loadWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.484&longitude=34.016&current_weather=true")
    .then(r=>r.json())
    .then(d=>{
      const w=d.current_weather;

      document.getElementById("weather").innerHTML =
        "🌦 Вільногірськ<br>" +
        "🌡 " + w.temperature + "°C<br>" +
        "💨 " + w.windspeed + " км/год";
    });
}

// запуск
loadTrains();
loadWeather();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(loadWeather,600000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
