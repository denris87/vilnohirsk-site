<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Vilnohirsk.online</title>

  <style>
    body {
      margin:0;
      background:#000;
      color:#00ff88;
      font-family: Arial;
      text-align:center;
    }

    h1 {
      padding:20px;
    }

    .widget {
      margin:20px auto;
      width:90%;
      max-width:600px;
      border:1px solid #00ff88;
      padding:10px;
    }
  </style>
</head>

<body>

<h1>📡 Vilnohirsk.online</h1>

<div class="widget">
  <div id="clock" style="font-size:32px; font-weight:bold;"></div>
</div>

<script>
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('uk-UA', {
    hour: '2-digit',
    minute: '2-digit'
  });
  document.getElementById('clock').innerText = time;
}
setInterval(updateClock, 1000);
updateClock();
</script>

<div class="widget">
  <div id="train-list">Завантаження...</div>
</div>

<script>
function loadTrains() {
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("train-list");

      list.innerHTML = data.trains.map(train => `
        <div style="margin:10px 0; border-bottom:1px solid #00ff88; padding-bottom:5px;">
          <strong>${train.number}</strong> — ${train.route}<br>
          🕒 ${train.time}
        </div>
      `).join("");
    })
    .catch(() => {
      document.getElementById("train-list").innerText = "Ошибка загрузки";
    });
}

loadTrains();
setInterval(loadTrains, 30000); // обновление каждые 30 сек
</script>

<div class="widget">
  🌦 Погода
</div>

</body>
</html>
