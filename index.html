<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  user-select: none;
}

body {
  color:#fff;
  font-family:Arial;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  min-height:100vh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,
    #a5ca49,#8cc454,#41bc81,#74bf54,#53bc67
  );
  background-size:400% 400%;
  background-attachment: fixed;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
  padding-bottom: calc(20px + var(--safe-bottom));
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  padding:14px;
  border-radius:16px;
  position:relative;
}

/* верхний блок */
.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* дата */
.datetime {
  text-align:left;
  font-family:"Courier New";
}

.date, .time {
  font-size: clamp(14px, 2.5vw, 22px);
}

.date {
  font-weight:900;
}

/* топливо */
.fuel {
  text-align:center;
  font-size: clamp(12px, 2.5vw, 18px);
  line-height:1.3;
}

.fuel div {
  display:flex;
  justify-content:center;
  gap:8px;
}

.fuel span:last-child {
  font-weight:bold;
}

/* погода */
.weather {
  text-align:right;
  font-size: clamp(12px, 3vw, 18px);
  line-height:1.2;
}

.weather-temp {
  font-weight:bold;
}

.weather-wind {
  font-size: 12px;
  opacity:0.9;
}

/* табло */
.info-header {
  text-align:center;
  color:#ff3b3b;
  font-weight:bold;
  font-size: clamp(14px,3vw,20px);
  cursor:pointer;
}

.info-content {
  display:none;
  margin-top:8px;
}

/* таблица */
.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
  justify-items:center;
}

.table-head {
  font-weight:700;
  border-bottom:2px solid #aaa;
  padding-bottom:8px;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.details {
  display:none;
}

.details-row div:nth-child(3) {
  color:#00ff9c;
}

.future .time-cell { color:#00ff9c; font-weight:bold; }
.soon .time-cell { color:#ffcc00; font-weight:bold; }
.passed .time-cell { color:#888; }

/* примітки */
.notes-title {
  margin-top:10px;
  color:#ff3b3b;
  font-weight:bold;
}

.notes-text {
  font-style:italic;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="widget">

  <div class="top-bar">

    <!-- дата -->
    <div class="datetime">
      <div class="date" id="date"></div>
      <div class="time" id="time"></div>
    </div>

    <!-- топливо -->
    <div class="fuel" id="fuel">
      Завантаження...
    </div>

    <!-- погода -->
    <div class="weather" id="weather">
      Завантаження...
    </div>

  </div>

</div>

<div class="widget">
  <div class="info-header" onclick="toggleInfo()">інформація</div>
  <div class="info-content" id="infoBox"></div>
</div>

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>

  <div class="notes-title">Примітки:</div>
  <div class="notes-text">Наразі жодних змін у розкладі немає...</div>
</div>

</div>
</div>

<script>
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();
  date.textContent = `${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  time.textContent = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
}

/* Погода */
function getWeatherEmoji(code){
  if(code === 0) return "☀️";
  if(code <= 2) return "⛅";
  if(code <= 3) return "☁️";
  if(code <= 67) return "🌧️";
  return "⛈️";
}

function loadWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true&timezone=Europe%2FKyiv")
  .then(r=>r.json())
  .then(d=>{
    const w=d.current_weather;
    const emoji=getWeatherEmoji(w.weathercode);

    weather.innerHTML = `
      <div>${emoji} Вільногірськ</div>
      <div class="weather-temp">${Math.round(w.temperature)}°C</div>
      <div class="weather-wind">💨 ${Math.round(w.windspeed)} м/с</div>
    `;
  });
}

/* Топливо (пример / fallback) */
function loadFuel(){
  // можно заменить на реальный API Укрнафты
  const data = {
    A92: 52.90,
    A95: 54.90,
    DT: 53.40,
    GAS: 26.80
  };

  fuel.innerHTML = `
    <div><span>А92</span><span>${data.A92}</span></div>
    <div><span>А95</span><span>${data.A95}</span></div>
    <div><span>ДТ</span><span>${data.DT}</span></div>
    <div><span>Газ</span><span>${data.GAS}</span></div>
  `;
}

/* поезда */
function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

const order=["6008","6010","6005","6018","6015","6038","6035","6037","6044","6043"];

function render(el,data){
  data.sort((a,b)=>order.indexOf(a.number)-order.indexOf(b.number));
  el.innerHTML="";

  data.forEach(x=>{
    const diff=getDiff(x.time);
    let cls="train";
    let label=x.time;

    if(diff<0) cls+=" passed";
    else if(diff<=10){cls+=" soon";label="≈ "+diff+" хв";}
    else cls+=" future";

    el.innerHTML+=`
      <div class="${cls}">
        <div>${x.number}</div>
        <div>${x.route}</div>
        <div class="time-cell">${label}</div>
      </div>
    `;
  });
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
  .then(r=>r.json())
  .then(d=>render(list,d.trains));
}

/* init */
loadTrains();
loadWeather();
loadFuel();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(loadWeather,600000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
