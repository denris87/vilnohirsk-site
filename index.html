<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  user-select: none;
}

body {
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,
    #a5ca49,#8cc454,#41bc81,#74bf54,#53bc67
  );
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-row {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  padding:14px;
  border-radius:16px;
}

.datetime {
  text-align:center;
  font-family:"Courier New";
}

.weekdays {
  display:flex;
  justify-content:center;
  gap:6px;
  margin:6px 0;
}

.day.active {
  background:red;
  border-radius:6px;
}

.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  justify-items:center;
  align-items:center;
}

.table-head {
  border-bottom:2px solid #aaa;
  padding-bottom:6px;
}

.train {
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.details {
  display:none;
}

.future .time-cell { color:#00ff9c; }
.soon .time-cell { color:#ffcc00; }
.passed .time-cell { color:#888; }

.notes-title { color:#ff3b3b; margin-top:10px; }
.notes-text { font-style:italic; }

</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="top-row">

<div class="widget">
  <div class="datetime">
    <div id="date"></div>
    <div class="weekdays" id="weekdays">
      <div class="day">пн</div>
      <div class="day">вт</div>
      <div class="day">ср</div>
      <div class="day">чт</div>
      <div class="day">пт</div>
      <div class="day">сб</div>
      <div class="day">нд</div>
    </div>
    <div id="time"></div>
  </div>
</div>

<div class="widget">
  <div id="weather">Завантаження...</div>
</div>

</div>

<!-- 1 ТАБЛО -->
<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут прямування</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>

  <div class="notes-title">Примітки:</div>
  <div class="notes-text">Наразі жодних змін у розкладі немає...</div>
</div>

<!-- 2 ТАБЛО -->
<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут прямування</div>
    <div>Відпр.</div>
  </div>

  <div id="list2"></div>
</div>

</div>
</div>

<script>
const dateEl = document.getElementById("date");
const timeEl = document.getElementById("time");
const list = document.getElementById("list");
const list2 = document.getElementById("list2");

function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime() {
  const now = getKyivNow();
  dateEl.textContent = now.toLocaleDateString();
  timeEl.textContent = now.toLocaleTimeString();
}

function loadWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true&timezone=Europe%2FKyiv")
  .then(r=>r.json())
  .then(d=>{
    const w=d.current_weather;
    document.getElementById("weather").innerHTML =
      `🌡 ${w.temperature}°C | 💨 ${w.windspeed} м/с`;
  });
}

function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

function render(el,data){
  el.innerHTML="";
  data.forEach(x=>{
    const diff=getDiff(x.time);
    let cls="train";

    if(diff<0) cls+=" passed";
    else if(diff<=10) cls+=" soon";
    else cls+=" future";

    el.innerHTML+=`
      <div class="${cls}">
        <div>${x.number}</div>
        <div>${x.route}</div>
        <div class="time-cell">${x.time}</div>
      </div>
    `;
  });
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
  .then(r=>r.json())
  .then(d=>{
    render(list,d.trains);
    render(list2,d.trains);
  });
}

loadTrains();
loadWeather();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
setInterval(loadWeather,600000);
</script>

</body>
</html>
