<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
}

body {
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93
  );
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.widget {
  background:rgba(0,0,0,0.6);
  padding:14px;
  border-radius:16px;
}

.table-head,
.train {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
  justify-items:center;
}

.table-head {
  font-weight:700;
  border-bottom:2px solid #aaa;
  padding-bottom:8px;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

/* шторки */
.details {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:all 0.4s ease;
}

.details.open {
  max-height:3000px;
  opacity:1;
  padding:10px 0;
}

.details-divider {
  width:60%;
  height:1px;
  background:#fff;
  margin:10px auto;
}

.details-note {
  text-align:center;
  font-weight:bold;
}

/* адаптив */
.schedule-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

@media (max-width:600px){
  .schedule-grid { grid-template-columns:1fr; }
}

@media (min-width:601px) and (max-width:900px){
  .schedule-grid { grid-template-columns:repeat(2,1fr); }
}

.schedule-column {
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  padding:8px;
}

.schedule-row {
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:6px 0;
  border-bottom:1px dashed #aaa;
  font-size:14px;
}

.schedule-row span:first-child {
  flex:1;
  white-space:normal;
}

.schedule-row span:last-child {
  min-width:55px;
  text-align:right;
  font-weight:bold;
}

.station-number {
  margin-right:6px;
  color:#ffcc00;
  font-weight:bold;
}

.schedule-row:last-child {
  border-bottom:none;
}
</style>
</head>

/* генератор */
function renderGrid(data){
  let i=1;
  const cols=[];
  for(let j=0;j<data.length;j+=10){
    cols.push(data.slice(j,j+10));
  }

  return `
    <div class="schedule-grid">
      ${cols.map(col=>`
        <div class="schedule-column">
          ${col.map(r=>`
            <div class="schedule-row">
              <span><span class="station-number">${i++}.</span>${r[0]}</span>
              <span>${r[1]}</span>
            </div>
          `).join("")}
        </div>
      `).join("")}
    </div>
  `;
}

function render(el,data){
  el.innerHTML="";
  data.forEach(x=>{
    const id="d-"+x.number;

    el.innerHTML+=`
      <div class="train" onclick="toggle('${id}')">
        <div>${x.number}</div>
        <div>${x.route}</div>
        <div>${x.time}</div>
      </div>

      <div class="details" id="${id}">
        ${x.number==="6005" ? renderGrid(fullSchedule6005) : ""}
        ${x.number==="6008" ? renderGrid(fullSchedule6008) : ""}
        ${x.number==="6010" ? renderGrid(fullSchedule6010) : ""}
        ${x.number==="6018" ? renderGrid(fullSchedule6018) : ""}
        <div class="details-divider"></div>
        <div class="details-note">змін немає...</div>
      </div>
    `;
  });
}

function toggle(id){
  document.getElementById(id).classList.toggle("open");
}
