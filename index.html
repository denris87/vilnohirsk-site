<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vilnohirsk.online</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
  margin:0;
  padding:0;
  height:100%;
}

* {
  -webkit-user-select: none;
  user-select: none;
}

body {
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;

  background: linear-gradient(-45deg,
    #f1df30,#04b6cb,#1cbca4,#c5d444,#26bc93,
    #a5ca49,#8cc454,#41bc81,#74bf54,#53bc67
  );
  background-size:400% 400%;
  animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-row {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
}

.widget {
  background:rgba(0,0,0,0.6);
  padding:14px;
  border-radius:16px;
}

/* дата */
.datetime {
  text-align:center;
  font-family:"Courier New";
}

.weekdays {
  display:flex;
  justify-content:center;
  gap:6px;
}

.day.active {
  background:red;
  border-radius:6px;
}

/* погода */
.weather {
  text-align:center;
  line-height:1.4;
}

.weather-city {
  font-weight:bold;
}

.weather-temp {
  font-size:22px;
  font-weight:bold;
}

.weather-wind {
  font-size:12px;
}

/* таблица */
.table-head,
.train,
.details-row {
  display:grid;
  grid-template-columns: 20% 1fr 20%;
  align-items:center;
  justify-items:center;
}

.table-head {
  font-weight:700;
  border-bottom:2px solid #aaa;
  padding-bottom:8px;
}

.train {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  font-size:22px;
}

/* маршрут */
.route {
  white-space:nowrap;
  text-align:center;
  width:100%;
  display:block;
}

/* шторки */
.details {
  display:none;
  padding:10px 0;
}

.details-divider {
  grid-column:2;
  width:60%;
  height:1px;
  background:#fff;
  margin:10px auto;
}

.details-note {
  grid-column:2;
}

.details-row div:nth-child(3) {
  color:#00ff9c;
  font-weight:bold;
}

/* цвета */
.future .time-cell { color:#00ff9c; font-weight:bold; }
.soon .time-cell { color:#ffcc00; font-weight:bold; }
.passed .time-cell { color:#888; }

/* номер */
.train-number {
  position:relative;
}

/* точка */
.alert-dot {
  position:absolute;
  top:-4px;
  right:-6px;
  width:6px;
  height:6px;
  background:#ff3b3b;
  border-radius:50%;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% {opacity:1;}
  50% {opacity:0;}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="top-row">

<div class="widget">
  <div class="datetime">
    <div id="date"></div>

    <div class="weekdays">
      <div class="day">пн</div>
      <div class="day">вт</div>
      <div class="day">ср</div>
      <div class="day">чт</div>
      <div class="day">пт</div>
      <div class="day">сб</div>
      <div class="day">нд</div>
    </div>

    <div id="time"></div>
  </div>
</div>

<div class="widget">
  <div class="weather" id="weather">Завантаження...</div>
</div>

</div>

<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>

  <div id="list"></div>
</div>

</div>
</div>

<script>

const changes = {
  "6008":"тест1",
  "6010":"тест2",
  "6035":"тест3"
};

const order=["6008","6010","6005","6018","6015","6038","6035","6037","6044","6043"];

const schedules={
  "6008":[["Пʼятихатки-Пас.","04:43"],["Вільногірськ","05:16"],["Верхівцеве","05:35"],["Верхньодніпровськ","06:15"],["Камʼянське-Пас.","06:42"],["Дніпро-Гол.","07:22"]],
  "6010":[["Пʼятихатки-Пас.","05:30"],["Вільногірськ","06:01"],["Верхівцеве","06:19"],["Верхньодніпровськ","06:38"],["Камʼянське-Пас.","07:17"],["Дніпро-Гол.","08:09"]],
  "6005":[["Дніпро-Гол.","04:52"],["Камʼянське-Пас.","05:48"],["Верхньодніпровськ","06:14"],["Верхівцеве","06:33"],["Вільногірськ","06:54"],["Пʼятихатки-Пас.","07:28"]],
  "6018":[["Пʼятихатки-Пас.","08:29"],["Вільногірськ","09:00"],["Верхівцеве","09:21"],["Верхньодніпровськ","09:40"],["Камʼянське-Пас.","10:04"],["Дніпро-Гол.","10:57"]],
  "6015":[["Дніпро-Гол.","08:22"],["Камʼянське-Пас.","09:20"],["Верхньодніпровськ","09:46"],["Верхівцеве","10:35"],["Вільногірськ","10:56"],["Пʼятихатки-Пас.","11:30"]],
  "6038":[["Пʼятихатки-Пас.","16:50"],["Вільногірськ","17:23"],["Верхівцеве","17:44"],["Верхньодніпровськ","18:03"],["Камʼянське-Пас.","18:27"],["Дніпро-Гол.","19:17"]],
  "6035":[["Дніпро-Гол.","16:38"],["Камʼянське-Пас.","17:44"],["Верхньодніпровськ","18:10"],["Верхівцеве","18:29"],["Вільногірськ","18:50"],["Пʼятихатки-Пас.","19:22"]],
  "6037":[["Дніпро-Гол.","17:34"],["Камʼянське-Пас.","18:33"],["Верхньодніпровськ","18:59"],["Верхівцеве","19:18"],["Вільногірськ","19:39"],["Пʼятихатки-Пас.","20:14"]],
  "6044":[["Пʼятихатки-Пас.","20:37"],["Вільногірськ","21:21"],["Верхівцеве","21:40"],["Верхньодніпровськ","21:58"],["Камʼянське-Пас.","22:22"],["Дніпро-Гол.","23:12"]],
  "6043":[["Дніпро-Гол.","20:18"],["Камʼянське-Пас.","21:16"],["Верхньодніпровськ","21:42"],["Верхівцеве","22:01"],["Вільногірськ","22:22"],["Пʼятихатки-Пас.","23:10"]]
};

/* 🔥 авто-подгон шрифта */
function fitText(el){
  let size = 22;
  el.style.fontSize = size + "px";

  while(el.scrollWidth > el.clientWidth && size > 10){
    size -= 1;
    el.style.fontSize = size + "px";
  }
}

function fitAll(){
  document.querySelectorAll(".route").forEach(fitText);
}

function getKyivNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

function updateDateTime(){
  const now=getKyivNow();

  date.textContent=`${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  time.textContent=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

  const days=document.querySelectorAll(".day");
  days.forEach(d=>d.classList.remove("active"));

  let i=now.getDay();
  i=i===0?6:i-1;
  days[i].classList.add("active");
}

function loadWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true&timezone=Europe%2FKyiv")
  .then(r=>r.json())
  .then(d=>{
    const w=d.current_weather;

    weather.innerHTML=`
      <div class="weather-city">Вільногірськ</div>
      <div class="weather-temp">${Math.round(w.temperature)}°C</div>
      <div class="weather-wind">💨 ${Math.round(w.windspeed)} м/с</div>
    `;
  });
}

function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

function render(el,data){
  data.sort((a,b)=>order.indexOf(a.number)-order.indexOf(b.number));
  el.innerHTML="";

  data.forEach(x=>{
    const diff=getDiff(x.time);

    let cls="train";
    let label=x.time;

    if(diff<0) cls+=" passed";
    else if(diff<=10){cls+=" soon";label="≈ "+diff+" хв";}
    else cls+=" future";

    const id="d-"+x.number;
    const dot = changes[x.number] ? `<span class="alert-dot"></span>` : "";

    el.innerHTML+=`
      <div class="${cls}" onclick="toggle('${id}')">
        <div class="train-number">${x.number}${dot}</div>
        <div class="route">${x.route}</div>
        <div class="time-cell">${label}</div>
      </div>
    `;

    if(schedules[x.number]){
      const note=changes[x.number]||"змін немає...";

      el.innerHTML+=`
      <div class="details" id="${id}">
        ${schedules[x.number].map(s=>`
          <div class="details-row">
            <div></div>
            <div>${s[0]}</div>
            <div>${s[1]}</div>
          </div>
        `).join("")}

        <div class="details-divider"></div>
        <div class="details-note">${note}</div>
      </div>`;
    }
  });

  setTimeout(fitAll, 50);
}

function toggle(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block"?"none":"block";
}

function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
  .then(r=>r.json())
  .then(d=>render(list,d.trains));
}

loadTrains();
loadWeather();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
setInterval(loadWeather,600000);

</script>

</body>
</html>
