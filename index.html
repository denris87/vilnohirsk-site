<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Smart Вільногірськ</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
:root {
  --highlight-color: #ffcc00; 
  --glass-bg: rgba(0, 0, 0, 0.45);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-light: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
  
  --time-green: #00ff9c;
  --time-passed: rgba(255, 255, 255, 0.4);
}

html, body { 
  margin: 0; 
  padding: 0; 
  min-height: 100vh; 
}

* { 
  -webkit-user-select: none; 
  user-select: none; 
  box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent; 
  touch-action: manipulation; 
}

body {
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  background: linear-gradient(-45deg, #1e3c72, #2a5298, #009ffd, #2af598, #009ffd);
  background-size: 300% 300%;
  animation: gradientMove 30s ease-in-out infinite alternate;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.wrapper { width: 100%; max-width: 900px; padding: 15px; padding-bottom: 40px; }
.container { display: flex; flex-direction: column; gap: 15px; }
.liquid-glass { background: var(--glass-bg); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-border-light); border-left: 1px solid var(--glass-border-light); box-shadow: var(--glass-shadow); border-radius: 28px; }

/* ІНФОРМАЦІЙНЕ ТАБЛО ВЕРХНЄ */
.alert-main-widget { padding: 0; border-radius: 28px; position: relative; z-index: 100; }
.alert-header { padding: 16px; text-align: center; cursor: pointer; background: rgba(255, 255, 255, 0.05); transition: background 0.3s; border-radius: 28px; }
.alert-header:active { background: rgba(255, 255, 255, 0.1); }
.alert-title-box { position: relative; display: inline-block; font-weight: 800; font-size: clamp(14px, 4vw, 18px); color: #ffffff; text-transform: uppercase; letter-spacing: 1px; }

.alert-drawer { position: absolute; top: calc(100% + 10px); left: 0; width: 100%; max-height: 0; overflow: hidden; opacity: 0; pointer-events: none; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); background: linear-gradient(135deg, #0b1d3a, #061124); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border-radius: 24px; }
.alert-drawer.open { max-height: 10000px; opacity: 1; padding: 15px; pointer-events: auto; }

/* ПОГОДА І ЧАС */
.top-row { display: flex; flex-direction: row; justify-content: space-between; gap: 12px; width: 100%; }
.widget { padding: 15px 10px; flex: 1; min-height: 125px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; position: relative; }
.datetime { text-align: center; width: 100%; }
#date { font-size: clamp(18px, 4.8vw, 24px); font-weight: 800; white-space: nowrap; letter-spacing: 0.5px; }
#time { font-size: clamp(16px, 4.2vw, 20px); font-weight: 700; white-space: nowrap; color: #fff; font-variant-numeric: tabular-nums; }
.weekdays { display: flex; justify-content: center; gap: 3px; font-size: clamp(9px, 2.3vw, 12px); font-weight: 700; margin: 6px 0; text-transform: uppercase; width: 100%; padding: 0 5px;}
.day { color: rgba(255,255,255,0.4); transition: 0.3s ease; }
.day.active { background-color: #ff4d4d !important; color: #fff !important; border-radius: 6px; padding: 2px 5px; box-shadow: 0 0 10px rgba(255, 77, 77, 0.4); }
.weather-box { position: relative; width: 100%; height: 95px; display: flex; align-items: center; justify-content: center; }
.weather-content { position: absolute; width: 100%; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); opacity: 0; transform: translateY(10px) scale(0.95); text-align: center; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.weather-content.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
.weather-city { font-weight: 700; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;}
.weather-temp { font-size: clamp(24px, 6.5vw, 32px); font-weight: 800; white-space: nowrap; text-shadow: 0 2px 10px rgba(0,0,0,0.4); line-height: 1.1; }
.weather-wind { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px; font-weight: 500; }

/* ТАБИ */
.tabs-wrapper { position: relative; width: 100%; border-radius: 20px; display: flex; overflow: hidden; }
.tabs-nav { display: flex; flex-wrap: nowrap; width: 100%; padding: 6px; gap: 8px; background: var(--glass-bg); backdrop-filter: blur(24px); border-radius: 20px; position: relative; z-index: 2; border: 1px solid var(--glass-border); overflow-x: auto; scrollbar-width: none; }
.tabs-nav::-webkit-scrollbar { display: none; }

.tab-btn { flex: 0 0 auto; padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.1); background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.25)); color: #ffffff; opacity: 0.9; font-weight: 700; cursor: pointer; border-radius: 14px; transition: all 0.3s ease; font-size: clamp(12px, 3.5vw, 14px); white-space: nowrap; }
.tab-btn.active { background: linear-gradient(145deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1)); opacity: 1; border: 1px solid rgba(255, 255, 255, 0.3); transform: translateY(-1px); }

.content-section { display: none; }
.content-section.active { display: block; }

.main-list-widget { position: absolute; top: calc(100% + 10px); left: 0; width: 100%; max-height: 0; overflow: hidden; opacity: 0; visibility: hidden; pointer-events: none; transition: max-height 0.5s ease-in-out, opacity 0.3s ease; background: linear-gradient(135deg, #0b1d3a, #061124); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border-radius: 24px; }
.main-list-widget.open { max-height: 15000px; opacity: 1; visibility: visible; pointer-events: auto; padding: 20px 10px; }

/* BLA BLA CAR СТИЛІ */
.blabla-actions { display: flex; gap: 10px; margin-bottom: 15px; padding: 0 5px; }
.blabla-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 5px; border-radius: 14px; font-weight: 800; font-size: 14px; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
.btn-driver { background: linear-gradient(135deg, #00ff9c, #00b8ff); color: #0b1d3a; }
.btn-passenger { background: linear-gradient(135deg, #ffcc00, #ff8800); color: #0b1d3a; }
.blabla-subtext { font-size: 10px; font-weight: 600; opacity: 0.8; margin-top: 3px; text-transform: uppercase;}

.blabla-toggle-container { display: flex; background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
.blabla-tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: rgba(255,255,255,0.5); font-weight: 700; font-size: 12px; border-radius: 8px; cursor: pointer; }
.blabla-tab-btn.active { background: rgba(255,255,255,0.15); color: #fff; }

.blabla-card { background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.2)); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
.blabla-route { font-size: 15px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
.blabla-date { font-size: 12px; color: var(--highlight-color); font-weight: 700; }
.blabla-info-row { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.2); padding: 8px 10px; border-radius: 8px; align-items: center;}
.blabla-phone { font-size: 14px; font-weight: 800; color: var(--time-green); text-decoration: none; }

/* МОДАЛЬНІ ВІКНА */
.custom-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); z-index: 99999; display: none; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px; }
.custom-modal-overlay.active { display: flex; }
.custom-modal-box { width: 100%; max-width: 400px; margin: auto; background: linear-gradient(145deg, rgba(20, 30, 50, 0.9), rgba(10, 15, 30, 0.95)); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 25px 20px; position: relative; }
.close-modal-btn { position: absolute; top: 15px; right: 15px; color: #fff; font-size: 24px; cursor: pointer; }
.form-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; color: #fff; font-size: 14px; width: 100%; margin-bottom: 12px; outline: none; }
.form-submit-btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; }

/* РЕШТА СТИЛІВ (ТРАНСПОРТ, МАРКЕТ) - СКОРОЧЕНО ДЛЯ ЕКОНОМІЇ МІСЦЯ */
.table-head { display: grid; grid-template-columns: 15% 1fr 18%; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 10px; color: #74b9ff; text-transform: uppercase; text-align: center; }
.train { display: grid; grid-template-columns: 15% 1fr 18%; align-items: center; padding: 14px 10px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border-radius: 16px; cursor: pointer; }
.train-num-box { font-weight: 800; background: rgba(255,255,255,0.1); padding: 4px; border-radius: 6px; text-align: center; font-size: 12px; }
.route-text { font-weight: 700; text-align: center; font-size: 13px; }
.time-val { font-weight: 800; text-align: center; }
.time-val.soon { color: var(--highlight-color); }
.time-val.future { color: var(--time-green); }
.time-val.passed { color: rgba(255,255,255,0.4); }

.shopping-drawer { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.5s ease; background: #0b1d3a; border-radius: 24px; }
.shopping-drawer.open { max-height: 15000px; opacity: 1; padding: 20px 15px; border: 1px solid rgba(255,255,255,0.15); }

</style>
</head>

<body>

<div id="auth-screen" style="display: none; justify-content: center; align-items: center; min-height: 100vh; width: 100%; padding: 20px;">
  <div class="liquid-glass" style="padding: 35px 25px; text-align: center;">
    <h2 style="color: var(--highlight-color);">Помилка доступу</h2>
    <p>Цей додаток працює лише всередині Telegram.</p>
  </div>
</div>

<div class="custom-modal-overlay" id="blabla-modal" onclick="closeBlaBlaForm(event)">
  <div class="custom-modal-box" onclick="event.stopPropagation()">
    <div class="close-modal-btn" onclick="closeBlaBlaForm()">&times;</div>
    <h3 class="form-title" id="form-modal-title" style="text-align:center; margin-bottom:20px;">Додати поїздку</h3>
    
    <form id="custom-blabla-form" onsubmit="submitBlaBlaForm(event)">
      <div style="display: flex; gap: 10px;">
        <input type="text" class="form-input" id="input-from" placeholder="Звідки" required>
        <input type="text" class="form-input" id="input-to" placeholder="Куди" required>
      </div>
      <input type="date" class="form-input" id="input-date" required>
      <div style="display: flex; gap: 10px;">
        <input type="time" class="form-input" id="input-time-from" required>
        <input type="time" class="form-input" id="input-time-to" placeholder="До">
      </div>
      <div style="display: flex; gap: 10px;">
        <select class="form-input" id="input-seats">
          <option value="1">1 місце</option>
          <option value="2" selected>2 місця</option>
          <option value="3">3 місця</option>
          <option value="4">4 місця</option>
        </select>
        <input type="number" class="form-input" id="input-price" placeholder="Ціна грн">
      </div>
      <input type="tel" class="form-input" id="input-phone" placeholder="0971234567" required>
      <textarea class="form-input" id="input-comment" rows="2" placeholder="Коментар..."></textarea>
      <input type="hidden" id="input-type">
      <button type="submit" class="form-submit-btn btn-driver" id="form-submit-btn">Опублікувати</button>
    </form>
  </div>
</div>

<div id="main-app-content" style="display: none; width: 100%; justify-content: center;">
  <div class="wrapper">
  <div class="container">

    <div class="alert-main-widget liquid-glass">
      <div class="alert-header" onclick="document.getElementById('alert-drawer').classList.toggle('open')">
        <div class="alert-title-box">ІНФОРМАЦІЙНЕ ТАБЛО <span class="banner-alert-dot" id="main-alert-dot"></span></div>
      </div>
      <div class="alert-drawer" id="alert-drawer">
        <div id="alert-drawer-content" style="text-align:center; opacity:0.6;">Перевірка повідомлень...</div>
      </div>
    </div>

    <div class="schedule-group">
      <div class="tabs-wrapper">
        <div class="tabs-nav" id="schedule-tabs">
          <button class="tab-btn" onclick="openScheduleTab('trains', this)">🚆 Електрички</button>
          <button class="tab-btn" onclick="openScheduleTab('long-trains', this)">🛤️ Потяги</button>
          <button class="tab-btn" onclick="openScheduleTab('buses', this)">🚌 Автобуси</button>
          <button class="tab-btn" onclick="openScheduleTab('blablacar', this)">🚗 Bla Bla Car</button>
        </div>
      </div>

      <div id="main-list-widget" class="main-list-widget">
        <div id="trains" class="content-section">
          <div id="list" style="text-align: center; padding: 20px; opacity:0.5;">Завантаження...</div>
        </div>
        <div id="long-trains" class="content-section">
          <div id="long-trains-list" style="text-align: center; padding: 20px; opacity:0.5;">Завантаження...</div>
        </div>
        <div id="buses" class="content-section">
          <div id="buses-list" style="text-align: center; padding: 20px; opacity:0.5;">Завантаження...</div>
        </div>
        
        <div id="blablacar" class="content-section">
          <div class="blabla-actions">
            <button class="blabla-btn btn-driver" onclick="openBlaBlaForm('driver')">🚗 Ти водій<span class="blabla-subtext">Дати авто</span></button>
            <button class="blabla-btn btn-passenger" onclick="openBlaBlaForm('passenger')">🧍 Ти пасажир<span class="blabla-subtext">Знайти місце</span></button>
          </div>
          <div class="blabla-toggle-container">
            <button class="blabla-tab-btn active" id="btn-show-drivers" onclick="switchBlaBlaList('drivers')">🚘 Водії</button>
            <button class="blabla-tab-btn" id="btn-show-passengers" onclick="switchBlaBlaList('passengers')">🙋‍♂️ Пасажири</button>
          </div>
          <div id="blabla-drivers-list"></div>
          <div id="blabla-passengers-list" style="display:none;"></div>
        </div>
      </div>
    </div>

    <div class="top-row">
      <div class="widget liquid-glass">
        <div id="date"></div>
        <div class="weekdays">
          <div class="day">пн</div><div class="day">вт</div><div class="day">ср</div><div class="day">чт</div><div class="day">пт</div><div class="day">сб</div><div class="day">нд</div>
        </div>
        <div id="time"></div>
      </div>
      <div class="widget liquid-glass" id="weather-container">
        Завантаження погоди...
      </div>
    </div>

    <div class="market-group">
      <div class="tabs-wrapper">
        <div class="tabs-nav">
          <button class="tab-btn" onclick="openMarketTab('shopping-tab', this)">🛍 Шопінг</button>
          <button class="tab-btn" onclick="openMarketTab('flea-market-tab', this)">📦 Барахолка</button>
        </div>
      </div>
      <div class="shopping-drawer" id="market-drawer">
        <div id="shopping-tab" class="content-section">
          <div id="shopping-list-content"></div>
        </div>
        <div id="flea-market-tab" class="content-section">
          <div id="flea-market-list-content"></div>
        </div>
      </div>
    </div>

  </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
const API_URL = 'https://vilnohirsk-blablacar-api-production-67d3.up.railway.app/api/rides';

// ПЕРЕВІРКА ТЕЛЕГРАМУ
if (tg.initDataUnsafe && Object.keys(tg.initDataUnsafe).length > 0) {
  document.getElementById('main-app-content').style.display = 'flex';
  if (tg.expand) tg.expand();
} else {
  document.getElementById('auth-screen').style.display = 'flex';
}

// ЧАС
function updateDateTime(){
  const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Kyiv"}));
  document.getElementById("date").textContent = now.toLocaleDateString('uk-UA');
  document.getElementById("time").textContent = now.toLocaleTimeString('uk-UA');
  const days = document.querySelectorAll(".day");
  days.forEach(d => d.classList.remove("active"));
  let i = now.getDay();
  days[i === 0 ? 6 : i - 1].classList.add("active");
}
setInterval(updateDateTime, 1000); updateDateTime();

// ПОГОДА
async function loadWeather(){
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.48&longitude=34.02&current_weather=true`);
    const d = await r.json();
    document.getElementById("weather-container").innerHTML = `
      <div class="weather-content active">
        <div class="weather-city">Вільногірськ</div>
        <div class="weather-temp">${Math.round(d.current_weather.temperature)}°C</div>
        <div style="font-size:11px; opacity:0.6;">💨 ${d.current_weather.windspeed} м/с</div>
      </div>`;
  } catch(e) {}
}
loadWeather();

// ТАБИ
function openScheduleTab(tabId, btn) {
  const widget = document.getElementById('main-list-widget');
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    widget.classList.remove('open');
    return;
  }
  document.querySelectorAll('#schedule-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#main-list-widget .content-section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
  widget.classList.add('open');
  if(tabId === 'blablacar') loadBlaBlaCarData();
}

function openMarketTab(tabId, btn) {
  const drawer = document.getElementById('market-drawer');
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    drawer.classList.remove('open');
    return;
  }
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#market-drawer .content-section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
  drawer.classList.add('open');
}

// BLA BLA CAR ЛОГІКА
function openBlaBlaForm(type) {
  const modal = document.getElementById('blabla-modal');
  document.getElementById('input-type').value = type;
  document.getElementById('form-modal-title').innerText = type === 'driver' ? '🚘 Дати авто' : '🧍 Шукаю місце';
  document.getElementById('form-submit-btn').className = 'form-submit-btn ' + (type === 'driver' ? 'btn-driver' : 'btn-passenger');
  modal.classList.add('active');
}

function closeBlaBlaForm() {
  document.getElementById('blabla-modal').classList.remove('active');
}

async function submitBlaBlaForm(event) {
  event.preventDefault();
  const btn = document.getElementById('form-submit-btn');
  btn.disabled = true;
  btn.innerText = 'Відправка...';

  const payload = {
    type: document.getElementById('input-type').value,
    from: document.getElementById('input-from').value,
    to: document.getElementById('input-to').value,
    date: document.getElementById('input-date').value,
    time: document.getElementById('input-time-to').value ? 
          `${document.getElementById('input-time-from').value} - ${document.getElementById('input-time-to').value}` : 
          document.getElementById('input-time-from').value,
    seats: document.getElementById('input-seats').value,
    price: document.getElementById('input-price').value || 0,
    phone: document.getElementById('input-phone').value,
    comment: document.getElementById('input-comment').value
  };

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      alert('✅ Додано!');
      document.getElementById('custom-blabla-form').reset();
      closeBlaBlaForm();
      loadBlaBlaCarData();
    } else {
      alert('❌ Помилка сервера');
    }
  } catch (error) {
    alert('❌ Помилка мережі');
  } finally {
    btn.disabled = false;
    btn.innerText = 'Опублікувати';
  }
}

async function loadBlaBlaCarData() {
  const dList = document.getElementById('blabla-drivers-list');
  const pList = document.getElementById('blabla-passengers-list');
  
  try {
    const response = await fetch(API_URL);
    const rides = await response.json();

    const drivers = rides.filter(r => r.type === 'driver');
    const passengers = rides.filter(r => r.type === 'passenger');

    const card = (r) => `
      <div class="blabla-card">
        <div class="blabla-route">📍 ${r.from} → ${r.to}</div>
        <div class="blabla-date">🗓 ${r.date} | 🕒 ${r.time}</div>
        <div class="blabla-info-row">
          <span>💺 Місць: <b>${r.seats}</b></span>
          ${r.type === 'driver' ? `<span>💰 <b>${r.price} грн</b></span>` : ''}
        </div>
        ${r.comment ? `<div style="font-size:11px; opacity:0.8; margin-top:5px;">💬 ${r.comment}</div>` : ''}
        <div style="text-align:right; margin-top:10px;">
          <a href="tel:${r.phone}" class="blabla-phone">📞 ${r.phone}</a>
        </div>
      </div>`;

    dList.innerHTML = drivers.length ? drivers.map(card).join('') : '<div style="text-align:center; padding:20px; opacity:0.5;">Водіїв немає</div>';
    pList.innerHTML = passengers.length ? passengers.map(card).join('') : '<div style="text-align:center; padding:20px; opacity:0.5;">Запитів немає</div>';

  } catch (e) {
    dList.innerHTML = '<div style="text-align:center; color:#ff6b6b;">Сервер недоступний</div>';
  }
}

window.switchBlaBlaList = function(type) {
  document.querySelectorAll('.blabla-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('blabla-drivers-list').style.display = 'none';
  document.getElementById('blabla-passengers-list').style.display = 'none';
  if (type === 'drivers') {
    document.getElementById('btn-show-drivers').classList.add('active');
    document.getElementById('blabla-drivers-list').style.display = 'block';
  } else {
    document.getElementById('btn-show-passengers').classList.add('active');
    document.getElementById('blabla-passengers-list').style.display = 'block';
  }
};

// ТРАНСПОРТ
async function loadTrainsData(){ 
  try {
    const r = await fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains");
    const d = await r.json();
    document.getElementById("list").innerHTML = `<div class="table-head"><div>№</div><div>Маршрут</div><div>Відпр.</div></div>` + 
      d.trains.map(t => `<div class="train"><div class="train-num-box">${t.number}</div><div class="route-text">${t.route}</div><div class="time-val future">${t.time}</div></div>`).join('');
  } catch(e) {}
}
loadTrainsData();

// Закриття шторок при кліку зовні
document.addEventListener('click', (e) => {
  if (!e.target.closest('.schedule-group')) {
    document.getElementById('main-list-widget').classList.remove('open');
    document.querySelectorAll('#schedule-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  }
  if (!e.target.closest('.market-group')) {
    document.getElementById('market-drawer').classList.remove('open');
    document.querySelectorAll('.market-group .tab-btn').forEach(b => b.classList.remove('active'));
  }
});
</script>
