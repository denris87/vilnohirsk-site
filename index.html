<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Vilnohirsk.online</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:900px;
  padding:20px 10px;
}

.container {
  display:flex;
  flex-direction:column;
  gap:20px;
}

.widget {
  background:#0b0b0b;
  padding:18px;
  border-radius:16px;
}

/* дата */
.datetime {
  text-align:center;
  color:#00ff9c;
  font-family:"Courier New";
}

.date {
  font-size:60px;
  font-weight:bold;
}

.time {
  font-size:36px;
}

/* таблица */
.table-head,
.train {
  display:grid;
  grid-template-columns: 120px 1fr 120px;
  align-items:center;
}

.table-head div {
  text-align:center;
}

.table-head {
  font-size:22px;
  color:#777;
  border-bottom:1px solid #333;
  padding-bottom:10px;
}

.train {
  padding:10px 0;
  border-bottom:1px solid #222;
  font-size:26px; /* УВЕЛИЧИЛ */
}

/* колонки */
.train div:nth-child(1) {
  text-align:center;
}

.route {
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.time-cell {
  text-align:center;
  font-weight:bold;
}

/* цвета */
.future div { color:#00ff9c !important; }
.soon div { color:#ffcc00 !important; }
.passed div { color:#555 !important; }
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<!-- ДАТА -->
<div class="widget">
  <div class="datetime">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
  </div>
</div>

<!-- СПИСОК -->
<div class="widget">
  <div class="table-head">
    <div>№</div>
    <div>Маршрут</div>
    <div>Відпр.</div>
  </div>
  <div id="list"></div>
</div>

</div>
</div>

<script>
// Киев время
function getKyivNow() {
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Kyiv"}));
}

// дата и время
function updateDateTime() {
  const now = getKyivNow();

  const d = String(now.getDate()).padStart(2,"0");
  const m = String(now.getMonth()+1).padStart(2,"0");
  const y = now.getFullYear();

  const h = String(now.getHours()).padStart(2,"0");
  const min = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  document.getElementById("date").textContent = `${d}.${m}.${y}`;
  document.getElementById("time").textContent = `${h}:${min}:${s}`;
}

// разница
function getDiff(time){
  const now=getKyivNow();
  const [h,m]=time.split(":").map(Number);
  const t=new Date(now);
  t.setHours(h,m,0,0);
  return Math.floor((t-now)/60000);
}

// порядок
const order = [
  "6008","6010","6005","6018","6015",
  "6038","6035","6037","6044","6043"
];

// рендер
function render(el,data){
  data.sort((a,b)=> order.indexOf(a.number) - order.indexOf(b.number));

  el.innerHTML="";

  data.forEach(x=>{
    const diff = getDiff(x.time);

    let cls = "train";
    let label = x.time;

    if(diff < 0){
      cls += " passed";
    } else if(diff <= 10){
      cls += " soon";
      label = "≈ " + diff + " хв";
    } else {
      cls += " future";
    }

    el.innerHTML += `
      <div class="${cls}">
        <div>№${x.number}</div>
        <div class="route">${x.route}</div>
        <div class="time-cell">${label}</div>
      </div>`;
  });
}

// загрузка
function loadTrains(){
  fetch("https://vilnohirsk-trains-production.up.railway.app/api/trains")
    .then(r=>r.json())
    .then(d=>{
      render(document.getElementById("list"), d.trains);
    });
}

// запуск
loadTrains();
updateDateTime();

setInterval(loadTrains,30000);
setInterval(updateDateTime,1000);
</script>

</body>
</html>
